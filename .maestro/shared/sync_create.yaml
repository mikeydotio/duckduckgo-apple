appId: com.duckduckgo.mobile.ios
# Creates a Sync account on this device using the simplified Sync setup UI.
---

- tapOn: Sync & Backup
- assertVisible: Sync & Backup
- tapOn:
    id: "SyncToggle"
- tapOn: Passcode field
- inputText: "0000"
- pressKey: Enter
- extendedWaitUntil:
    visible: Sync your data with another device?
    timeout: 30000
- tapOn: Not Now
- assertVisible: Synced Devices
- scrollUntilVisible:
    element:
      text: Copy Recovery Code
    direction: DOWN
- tapOn: Copy Recovery Code
# Re-authenticate only if the 15s auth session has expired since enabling sync.
- runFlow:
    when:
      visible: Unlock device to set up Sync & Backup
    commands:
      - runFlow:
          file: ../shared/dismiss_application_lock.yaml
