appId: com.duckduckgo.mobile.ios
# Logs into an existing Sync account by connecting with another device and
# pasting a recovery/connect code, using the simplified Sync setup UI.
# Starts on the logged-out Sync settings screen. On success the device list updates.
---

- assertVisible: Sync With Another Device
- tapOn: Sync With Another Device

- runFlow:
    file: ../shared/dismiss_application_lock.yaml

- runFlow:
    when:
      visible: Allows you to upload photographs and videos
    commands:
        - tapOn: "Allow"
- assertVisible: Scan QR Code
- tapOn: Manually Enter Code
- tapOn: Paste
- assertVisible:
    id: "device"
    index: 1
