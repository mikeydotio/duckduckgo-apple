appId: com.duckduckgo.mobile.ios
# Recovers a Sync account from a recovery code via the simplified UI:
# "Use Recovery Code" -> authenticate -> "Recover your synced data" sheet ->
# manually paste the code. Starts on the logged-out Sync settings screen.
---

- assertVisible: Use Recovery Code
- tapOn: Use Recovery Code

- runFlow:
    file: ../shared/dismiss_application_lock.yaml

- assertVisible: Recover your synced data
- tapOn: Recover Synced Data
- runFlow:
    when:
      visible: Allows you to upload photographs and videos
    commands:
        - tapOn: "Allow"
- tapOn: Manually Enter Code
- tapOn: Paste
- assertVisible:
    id: "device"
