appId: com.duckduckgo.mobile.ios
# Turns off Sync (without deleting server data) via the simplified UI: toggling
# the "Sync & Backup" switch (id "SyncToggle") off and confirming the alert.
---

- assertVisible: Sync & Backup
- scrollUntilVisible:
    element:
      id: "SyncToggle"
    direction: UP
- tapOn:
    id: "SyncToggle"
- assertVisible: Turn Off Sync & Backup?
- tapOn: Turn Off
- assertVisible: Use Recovery Code
