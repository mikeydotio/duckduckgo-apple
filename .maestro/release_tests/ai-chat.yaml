# ai-chat.yaml
appId: com.duckduckgo.mobile.ios
tags:
    - iphone
    - release

---

- launchApp:
    appId: "com.duckduckgo.mobile.ios"
    clearState: true
    clearKeychain: true
    arguments:
        isOnboardingCompleted: ${ONBOARDING_COMPLETED}
        currentAppVariant: ${APP_VARIANT}
        isRunningUITests: true
        ff.browsingMenuSheetEnabledByDefault: "true"
        ff.unifiedToggleInput: "true"

# NTP: tap Duck.ai button — opens chat tab
- assertVisible:
    id: "Browser.OmniBar.Button.AIChat"
- tapOn:
    id: "Browser.OmniBar.Button.AIChat"

- runFlow:
    when:
        visible: "Agree and Continue"
    commands:
        - tapOn: "Agree and Continue"
- runFlow:
    when:
        visible: "×"
    commands:
        - tapOn: "×"
- runFlow:
    when:
        visible: "×"
    commands:
        - tapOn: "×"

# Verify chat tab header
- assertVisible: "Free Plan"
- assertVisible: "Upgrade"
- assertVisible: "Close tab"
- assertVisible: "Recent chats"
- assertVisible: "New"
- assertVisible:
    id: "AIChat.Toolbar.Button.ModelChip"

# Close tab to return to NTP
- tapOn: "Close tab"
- assertVisible:
    id: "searchEntry"

# Navigate to a web page
- tapOn:
    id: "searchEntry"
- inputText: "https://privacy-test-pages.site"
- pressKey: Enter
- assertVisible: ".*Privacy Test Pages.*"

# Browsing Menu: "Duck.ai" opens the chat tab from a web page
- tapOn: "Browsing Menu"
- assertVisible: "Duck.ai"
- tapOn: "Duck.ai"
- assertVisible: "Free Plan"
- assertVisible: "Close tab"

# Close tab to return to web page
- tapOn: "Close tab"
- assertVisible: ".*Privacy Test Pages.*"

# Tab Switcher: verify Duck.ai tab shortcut is accessible
- tapOn: "Tab Switcher"
- assertVisible:
    id: "TabSwitcher.Button.DuckChat"
- tapOn:
    id: "TabSwitcher.Button.DuckChat"
- assertVisible: "Free Plan"
- assertVisible: "Close tab"

# Close tab to prepare for AI Features off test
- tapOn: "Close tab"

# Turn Duck.ai OFF entirely via the master toggle in AI Features.
# (The "Search Only" picker only hides the unified Search/Duck.ai toggle — it does NOT
# disable Duck.ai. The master switch on the "Duck.ai" row is the setting that removes
# Duck.ai access; toggling it off also hides the mode picker below it.)
- tapOn: "Browsing Menu"
- tapOn: "Settings"
- scrollUntilVisible:
    element: "AI Features"
    direction: DOWN
- tapOn: "AI Features"
- tapOn:
    id: "Settings.AIFeatures.EnableToggle"
- tapOn: "Settings"
- tapOn: "Done"

# Verify chat button hidden in omnibar
- assertNotVisible:
    id: "Browser.OmniBar.Button.AIChat"

# Verify "Duck.ai" entry hidden in Browsing Menu
- tapOn:
    id: "searchEntry"
- inputText: "https://privacy-test-pages.site"
- pressKey: Enter
- assertVisible: ".*Privacy Test Pages.*"
- tapOn: "Browsing Menu"
- assertNotVisible: "Duck.ai"
- tapOn: "Settings"
- tapOn: "Done"

# Verify Tab Switcher has no Duck.ai shortcut
- tapOn: "Tab Switcher"
- assertNotVisible:
    id: "TabSwitcher.Button.DuckChat"
