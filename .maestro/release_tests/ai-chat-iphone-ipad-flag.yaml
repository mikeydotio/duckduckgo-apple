# ai-chat-iphone-ipad-flag.yaml
appId: com.duckduckgo.mobile.ios
tags:
    - iphone
    - release

---

# Force iPad-only AI toggle ON and verify it does not affect iPhone behavior
- launchApp:
    appId: "com.duckduckgo.mobile.ios"
    clearState: true
    clearKeychain: true
    arguments:
        isOnboardingCompleted: ${ONBOARDING_COMPLETED}
        currentAppVariant: ${APP_VARIANT}
        isRunningUITests: true
        isInternalUser: ${INTERNAL_USER_MODE}
        ff.iPadAIToggle: "true"
        ff.unifiedToggleInput: "true"

# iPhone address bar shows Duck.ai button; iPad ModeToggle controls never appear on iPhone
- assertVisible:
    id: "searchEntry"
- assertVisible:
    id: "Browser.OmniBar.Button.AIChat"
- assertNotVisible:
    id: "Browser.OmniBar.Button.ModeToggle.Search"
- assertNotVisible:
    id: "Browser.OmniBar.Button.ModeToggle.AIChat"

# Open AI Features and verify iPad-only flag does not hide iPhone settings
- tapOn: "Browsing Menu"
- tapOn: "Settings"
- scrollUntilVisible:
    element: "AI Features"
    direction: DOWN
- tapOn: "AI Features"
- assertVisible: "Duck.ai"
- assertVisible:
    id: "Settings.AIFeatures.Picker.SearchOnly"
- assertVisible:
    id: "Settings.AIFeatures.Picker.SearchAndDuckAI"
- scrollUntilVisible:
    element: "Manage Duck.ai Shortcuts"
    direction: DOWN
- tapOn: "Manage Duck.ai Shortcuts"
- assertVisible: "Address Bar"
- tapOn: "AI Features"

# Select Search & Duck.ai — iPhone still shows no iPad ModeToggle controls
- tapOn:
    id: "Settings.AIFeatures.Picker.SearchAndDuckAI"
- tapOn: "Settings"
- tapOn: "Done"
- assertVisible:
    id: "Browser.OmniBar.Button.AIChat"
- assertNotVisible:
    id: "Browser.OmniBar.Button.ModeToggle.Search"
- assertNotVisible:
    id: "Browser.OmniBar.Button.ModeToggle.AIChat"

# Select Search Only — iPhone remains unaffected by iPad-only feature behavior
- tapOn: "Browsing Menu"
- tapOn: "Settings"
- scrollUntilVisible:
    element: "AI Features"
    direction: DOWN
- tapOn: "AI Features"
- tapOn:
    id: "Settings.AIFeatures.Picker.SearchOnly"
- tapOn: "Settings"
- tapOn: "Done"
- assertVisible:
    id: "Browser.OmniBar.Button.AIChat"
- assertNotVisible:
    id: "Browser.OmniBar.Button.ModeToggle.Search"
- assertNotVisible:
    id: "Browser.OmniBar.Button.ModeToggle.AIChat"
