# firebutton.yaml
appId: com.duckduckgo.mobile.ios
tags:
    - iphone
    - release

---

# Set up 
- runFlow: 
    file: ../shared/setup.yaml

# Load Site
- assertVisible:
    id: "searchEntry"
- tapOn: 
    id: "searchEntry"
- inputText: "https://privacy-test-pages.site/features/local-storage.html"
- pressKey: Enter

# Wait for the page to finish loading (Manual Increment is a page-rendered button)
# before asserting on counter values, otherwise the assertion can race the page load.
- extendedWaitUntil:
    visible: "Manual Increment"
    timeout: 5000

# Add a cookie
- assertVisible: "Storage Counter: undefined"
- assertVisible: "Cookie Counter:"
- assertNotVisible: "Cookie Counter: 1"
- assertNotVisible: "Storage Counter: 1"
- tapOn: "Manual Increment"
- assertVisible: "Cookie Counter: 1"
- assertVisible: "Storage Counter: 1"

# Load a new tab
- tapOn: "Tab Switcher"
- tapOn: "New Tab"
- assertVisible:
    id: "searchEntry"
- tapOn: 
    id: "searchEntry"
- inputText: "https://example.com"
- pressKey: Enter

- assertVisible: ".*Example Domain.*"

# Close tab
- tapOn: "Tab Switcher"
# Wait for the page <title> to propagate via WKWebView KVO into the tab cell's
# accessibility label. The body H1 ("Example Domain") paints before the title
# reaches the tab model, so on slower runners the close-button label is still
# the host fallback ("Close \"example.com\" at example.com") at this point.
- extendedWaitUntil:
    visible: "Close \"Example Domain\" at example.com"
    timeout: 5000
- tapOn: "Close \"Example Domain\" at example.com"
- tapOn: "New Tab"

# Check history
- assertVisible:
    id: "searchEntry"
- tapOn: 
    id: "searchEntry"
- inputText: "ex"
- assertVisible: "example.com"
- assertVisible: "Example Domain"
- tapOn: "Example Domain"

# Fire button
- runFlow:
    file: ../shared/use_firebutton.yaml

- assertNotVisible: "https://example.com/"
- assertVisible: "Search or enter address"
- runFlow:
    file: ../shared/dismiss_address_bar_editing.yaml
- tapOn: "Tab Switcher"
- assertNotVisible: "Example Domain"
- assertVisible: "1 Private Tab"
- tapOn: "Done"

# Load Site
- assertVisible:
    id: "searchEntry"
- tapOn: 
    id: "searchEntry"

- inputText: "ex"
- assertNotVisible: "example.com"
- assertNotVisible: "Example Domain"

- pressKey: Backspace
- pressKey: Backspace

- inputText: "https://privacy-test-pages.site/features/local-storage.html"
- pressKey: Enter
- extendedWaitUntil:
    visible: "Manual Increment"
    timeout: 5000
- assertVisible: "Storage Counter: undefined"
- assertVisible: "Cookie Counter:"

# Clear from Tab Switcher

- tapOn: "Tab Switcher"
- assertVisible: "1 Private Tab"
- runFlow:
    file: ../shared/use_firebutton.yaml

- assertNotVisible: "https://privacy-test-pages.site/features/local-storage.html"
- assertVisible: "Search or enter address"
- runFlow:
    file: ../shared/dismiss_address_bar_editing.yaml
- tapOn: "Tab Switcher"
- assertNotVisible: "Example Domain"
- assertVisible: "1 Private Tab"
- tapOn: "Done"

# Load Site
- assertVisible:
    id: "searchEntry"
- tapOn: 
    id: "searchEntry"

- inputText: "ex"
- assertNotVisible: "example.com"
- assertNotVisible: "Example Domain"

- pressKey: Backspace
- pressKey: Backspace

- inputText: "https://privacy-test-pages.site/features/local-storage.html"
- pressKey: Enter
- extendedWaitUntil:
    visible: "Manual Increment"
    timeout: 5000
- assertVisible: "Storage Counter: undefined"
- assertVisible: "Cookie Counter:"

# Clear from Data Clearing Settings

- tapOn: "Browsing Menu"
- tapOn: "Settings"
- scrollUntilVisible: 
    element: "Data Clearing"
- tapOn: "Data Clearing"
- tapOn: 
    id: "Settings.DataClearing.Button.ForgetAll"
- tapOn: 
    id: "alert.forget-data.confirm"
- waitForAnimationToEnd:
    timeout: 5000
- extendedWaitUntil:
    visible: "Settings"
    timeout: 1000
- tapOn: "Settings"
- tapOn: "Done"

- assertNotVisible: "https://privacy-test-pages.site/features/local-storage.html"
- assertVisible: "Search or enter address"

