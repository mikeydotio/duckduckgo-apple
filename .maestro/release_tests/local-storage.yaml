# local-storage.yaml
appId: com.duckduckgo.mobile.ios
tags:
    - iphone
    - release
    # Temporary tag for CI scope reduction during firebutton flake fix validation.
    - firebutton_validation

---

# Set up 
- runFlow: 
    file: ../shared/setup.yaml

# Load Site
- assertVisible:
    id: "searchEntry"
- tapOn: 
    id: "searchEntry"
- inputText: "https://privacy-test-pages.site/features/local-storage.html"
- pressKey: Enter

# Wait for the page to finish loading (Manual Increment is a page-rendered button)
# before asserting on counter values, otherwise the assertion can race the page load.
- extendedWaitUntil:
    visible: "Manual Increment"
    timeout: 5000

# Add a cookie
- assertVisible: "Storage Counter: undefined"
- assertVisible: "Cookie Counter:"
- assertNotVisible: "Cookie Counter: 1"
- assertNotVisible: "Storage Counter: 1"
- tapOn: "Manual Increment"
- tapOn: "Manual Increment"
- assertVisible: "Cookie Counter: 2"
- assertVisible: "Storage Counter: 2"

# Fireproofing
- runFlow:
    file: ../shared/open_browsing_menu_item.yaml
    env:
        ITEM: "Fireproof This Site"
- tapOn: "Fireproof"

# Fire button
- runFlow:
    file: ../shared/use_firebutton.yaml

- assertNotVisible: "https://privacy-test-pages.site/features/local-storage.html"

# Load Site
- assertVisible:
    id: "searchEntry"
- tapOn: 
    id: "searchEntry"

- inputText: "https://privacy-test-pages.site/features/local-storage.html"
- pressKey: Enter
- extendedWaitUntil:
    visible: "Manual Increment"
    timeout: 5000
- assertVisible: "Storage Counter: 2"
- assertVisible: "Cookie Counter: 2"

# Remove Fireproofing
- runFlow:
    file: ../shared/open_browsing_menu_item.yaml
    env:
        ITEM: "Remove Fireproofing"

# Fire button
- runFlow:
    file: ../shared/use_firebutton.yaml

- assertNotVisible: "https://privacy-test-pages.site/features/local-storage.html"

# Load Site
- assertVisible:
    id: "searchEntry"
- tapOn: 
    id: "searchEntry"

- inputText: "https://privacy-test-pages.site/features/local-storage.html"
- pressKey: Enter
- extendedWaitUntil:
    visible: "Manual Increment"
    timeout: 5000
- assertVisible: "Storage Counter: undefined"
- assertVisible: "Cookie Counter:"
