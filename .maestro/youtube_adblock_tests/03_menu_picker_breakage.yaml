# YouTube Ad Blocking — browsing-menu toggle, mode picker, and breakage sheet.
# Requires a real YouTube video page (the menu entry is the only entry point for
# the picker and breakage flows). Covers: picker dismiss leaves state unchanged,
# disabling via the picker, the disabled state reflected in Settings, the menu
# Enable/Disable flip, and the breakage report Cancel and Send paths.
appId: com.duckduckgo.mobile.ios
tags:
    - youtube_adblock
    - iphone
---
- runFlow:
    file: shared/constants.yaml
- runFlow:
    file: shared/launch_enabled.yaml
- runFlow:
    file: shared/load_youtube_video.yaml

# Menu shows "Disable" while enabled
- runFlow:
    file: shared/open_video_menu.yaml
- assertVisible: ${output.menuDisable}

# Open the picker and dismiss without choosing -> state unchanged
- tapOn: ${output.menuDisable}
- waitForAnimationToEnd
- assertVisible: ${output.pickerTitle}
- assertVisible: ${output.modeAlwaysOn}
- assertVisible: ${output.modeDisableUntilRelaunch}
- assertVisible: ${output.modeAlwaysOff}
- tapOn: ${output.closeLabel}
- waitForAnimationToEnd
- runFlow:
    file: shared/open_video_menu.yaml
- assertVisible: ${output.menuDisable}

# Disable via the picker (Always Off) -> breakage sheet -> Cancel
- tapOn: ${output.menuDisable}
- waitForAnimationToEnd
- tapOn: ${output.modeAlwaysOff}
- waitForAnimationToEnd
- assertVisible: ${output.breakageTitle}
- assertVisible: ${output.breakageSend}
- assertVisible: ${output.cancelLabel}
- tapOn: ${output.cancelLabel}
- waitForAnimationToEnd

# Settings reflects the disabled state
- runFlow:
    file: shared/open_settings.yaml
- assertVisible:
    text: ${output.toggleOff}
- runFlow:
    file: shared/close_settings.yaml

# Menu now offers "Enable"; re-enabling flips it back to "Disable"
- runFlow:
    file: shared/open_video_menu.yaml
- assertVisible: ${output.menuEnable}
- tapOn: ${output.menuEnable}
- waitForAnimationToEnd
- runFlow:
    file: shared/open_video_menu.yaml
- assertVisible: ${output.menuDisable}

# Breakage report Send path (final step: the sheet segues to the report flow)
- tapOn: ${output.menuDisable}
- waitForAnimationToEnd
- tapOn: ${output.modeAlwaysOff}
- waitForAnimationToEnd
- assertVisible: ${output.breakageTitle}
- tapOn: ${output.breakageSend}
- waitForAnimationToEnd
- assertNotVisible: ${output.breakageTitle}
