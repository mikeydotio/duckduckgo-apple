# YouTube Ad Blocking — Settings content and toggle.
# Verifies the settings screen renders, defaults ON under rollout flags, and the
# toggle flips off then on, then loads a YouTube video as a smoke check with ad
# blocking enabled.
appId: com.duckduckgo.mobile.ios
tags:
    - youtube_adblock
    - iphone
---
- runFlow:
    file: shared/constants.yaml
- runFlow:
    file: shared/launch_enabled.yaml
- runFlow:
    file: shared/open_settings.yaml

# Screen content
- assertVisible: ${output.sectionHeader}
- assertVisible: ${output.toggleLabel}
- assertVisible: ${output.toggleExplanation}

# Defaults ON (rollout defaults active)
- assertVisible:
    text: ${output.toggleOn}

# Toggle OFF
- tapOn:
    text: ${output.toggleOn}
    index: 0
- assertVisible:
    text: ${output.toggleOff}

# Toggle back ON
- tapOn:
    text: ${output.toggleOff}
    index: 0
- assertVisible:
    text: ${output.toggleOn}

# Load a YouTube video with ad blocking enabled (toggled back on above) as a smoke
# check that a playable video page loads. The "YouTube Ad Block On" badge animates
# into the address bar here, but it's transient so we don't assert it.
- runFlow:
    file: shared/close_settings.yaml
- runFlow:
    file: shared/navigate_to_youtube_video.yaml
