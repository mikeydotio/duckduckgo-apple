appId: com.duckduckgo.mobile.ios
---

# Load constants
- runFlow:
    file: constants.yaml

# Duck Player is now nested under Ad Blocking — step back one level first.
- tapOn: ${output.adBlockingLabel}

- waitForAnimationToEnd

- tapOn: ${output.settingsLabel}

- waitForAnimationToEnd

- tapOn: ${output.doneLabel}

- waitForAnimationToEnd
