appId: com.duckduckgo.mobile.ios
tags:
    - iphone
    - pir

---

# Cold launch with no profile
- launchApp:
    appId: "com.duckduckgo.mobile.ios"
    clearState: true
    clearKeychain: true
    arguments:
        isOnboardingCompleted: "true"
        currentAppVariant: "null"
        isRunningUITests: "true"
        isInternalUser: "false"
        "ff.personalInformationRemoval": "true"
        "pir.profileState": "noProfile"
        "pir.debugServer": "true"

- runFlow:
    file: ../shared/delay.yaml

- runScript:
    file: ../shared/scripts/assert_pir_runtime_status.js
    env:
        EXPECT_INITIALIZED: "false"

- stopApp

# Cold launch with no profile then open dashboard
- launchApp:
    appId: "com.duckduckgo.mobile.ios"
    clearState: false
    clearKeychain: false
    arguments:
        isOnboardingCompleted: "true"
        currentAppVariant: "null"
        isRunningUITests: "true"
        isInternalUser: "false"
        "ff.personalInformationRemoval": "true"
        "pir.profileState": "noProfile"
        "pir.debugServer": "true"
        "pir.openDashboardForTesting": "true"

- extendedWaitUntil:
    visible:
        id: "PIR.Dashboard.WebView"
    timeout: 30000

- runScript:
    file: ../shared/scripts/assert_pir_runtime_status.js
    env:
        EXPECT_INITIALIZED: "true"
        EXPECT_LAST_INIT_REASON: "dashboard"

- stopApp

# Cold launch with profile
- launchApp:
    appId: "com.duckduckgo.mobile.ios"
    clearState: true
    clearKeychain: true
    arguments:
        isOnboardingCompleted: "true"
        currentAppVariant: "null"
        isRunningUITests: "true"
        isInternalUser: "false"
        "ff.personalInformationRemoval": "true"
        "pir.profileState": "hasProfile"
        "pir.debugServer": "true"

- runFlow:
    file: ../shared/delay.yaml

- runScript:
    file: ../shared/scripts/assert_pir_runtime_status.js
    env:
        EXPECT_INITIALIZED: "true"
        EXPECT_LAST_INIT_REASON: "launch,appActive"

- stopApp

# Cold launch with unknown profile state
- launchApp:
    appId: "com.duckduckgo.mobile.ios"
    clearState: true
    clearKeychain: true
    arguments:
        isOnboardingCompleted: "true"
        currentAppVariant: "null"
        isRunningUITests: "true"
        isInternalUser: "false"
        "ff.personalInformationRemoval": "true"
        "pir.profileState": "unknown"
        "pir.debugServer": "true"

- runFlow:
    file: ../shared/delay.yaml

- runScript:
    file: ../shared/scripts/assert_pir_runtime_status.js
    env:
        EXPECT_INITIALIZED: "true"
        EXPECT_LAST_INIT_REASON: "launch,appActive"
