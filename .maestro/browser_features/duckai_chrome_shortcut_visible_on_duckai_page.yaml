# duckai_chrome_shortcut_visible_on_duckai_page.yaml
#
# Scenario 3: Both chip halves stay visible regardless of the current page —
# on the New Tab Page and on a Duck.ai page (they are no longer hidden by page type).
appId: com.duckduckgo.mobile.ios
tags:
    - ipad
    - duckai_chrome_shortcut

---

- runFlow: ../shared/duckai_chrome_shortcut_setup.yaml

# On the New Tab Page both halves are shown.
- assertVisible:
    id: "Browser.TabsBar.AIChatChip.OpenButton"
- assertVisible:
    id: "Browser.TabsBar.AIChatChip.SheetToggleButton"

# Navigate to a Duck.ai page.
- assertVisible:
    id: "searchEntry"
- tapOn:
    id: "searchEntry"
- inputText: "https://duck.ai"
- pressKey: Enter
- waitForAnimationToEnd:
    timeout: 3000

# Both halves remain visible on a Duck.ai page.
- assertVisible:
    id: "Browser.TabsBar.AIChatChip.OpenButton"
- assertVisible:
    id: "Browser.TabsBar.AIChatChip.SheetToggleButton"
