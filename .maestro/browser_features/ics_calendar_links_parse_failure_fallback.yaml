# ics_calendar_links_parse_failure_fallback.yaml
# Malformed .ics should fall back to QuickLook (and show the parse-failure toast).
appId: com.duckduckgo.mobile.ios
tags:
    - iphone
    - release

---

- runFlow:
    file: ../shared/setup.yaml

- assertVisible:
    id: "searchEntry"
- tapOn:
    id: "searchEntry"
- inputText: "https://privacy-test-pages.site/features/download/calendar-malformed.ics"
- pressKey: Enter

- extendedWaitUntil:
    visible:
        id: "QLOverlayDoneButtonAccessibilityIdentifier"
    timeout: 10000
