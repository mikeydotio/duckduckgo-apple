appId: com.duckduckgo.mobile.ios
tags:
    - iphone
    - securityTest
---

# Set up 
- runFlow: 
    file: ../shared/setup.yaml

# Load Site
- assertVisible:
    id: "searchEntry"
- tapOn: 
    id: "searchEntry"
- inputText: "https://privacy-test-pages.site/security/address-bar-spoofing/spoof-form-action.html"
- pressKey: Enter

# Test
- tapOn: "run"
# Wait for the redirect navigation to land before reading the address bar.
- extendedWaitUntil:
    visible:
        id: "searchEntry"
        text: "duckduckgo.com"
    timeout: 10000
- copyTextFrom:
    id: "searchEntry"
- assertTrue: ${maestro.copiedText == "duckduckgo.com"}
- assertNotVisible: "Not DDG."
