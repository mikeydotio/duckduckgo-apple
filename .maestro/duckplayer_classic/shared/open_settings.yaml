appId: com.duckduckgo.mobile.ios
---
# Open Settings - Works on both iPhone and iPad
- tapOn:
    id: "Browser.OmniBar.Button.BrowsingMenu"
    
- waitForAnimationToEnd:
    timeout: 1000
    
- tapOn: Settings

- waitForAnimationToEnd

# Duck Player now lives inside the Ad Blocking screen (under Privacy Protections).
- scrollUntilVisible:
    element:
      text: "Ad Blocking"
    direction: DOWN
    centerElement: true

- tapOn:
    text: "Ad Blocking"

- waitForAnimationToEnd

- scrollUntilVisible:
    element:
      text: "Duck Player"
    direction: DOWN
    centerElement: true

- tapOn:
    text: "Duck Player"

- waitForAnimationToEnd