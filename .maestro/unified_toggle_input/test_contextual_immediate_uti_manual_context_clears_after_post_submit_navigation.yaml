appId: com.duckduckgo.mobile.ios
tags:
    - iphone
    - release
    - unified_toggle_input
name: test_contextual_immediate_uti_manual_context_clears_after_post_submit_navigation

---

# With immediate contextual UTI on and automatic attachment off, manually attached
# page context is cleared when the sheet is closed after first submit, the user
# navigates to another page, and then reopens contextual Duck.ai.

- launchApp:
    appId: "com.duckduckgo.mobile.ios"
    clearState: true
    clearKeychain: true
    arguments:
        isOnboardingCompleted: ${ONBOARDING_COMPLETED}
        currentAppVariant: ${APP_VARIANT}
        isRunningUITests: true
        ff.unifiedToggleInput: "true"
        ff.contextualDuckAIMode: "true"
        ff.aiChatContextualUnifiedToggleInput: "true"
        ff.aiChatAutoAttachContextByDefault: "false"

- runFlow:
    file: ../shared/dismiss_chat_open_modals.yaml

- tapOn:
    id: "searchEntry"
- inputText: "https://privacy-test-pages.site"
- pressKey: Enter
- assertVisible: ".*Privacy Test Pages.*"

- tapOn:
    id: "Browser.OmniBar.Button.AIChat"
- assertVisible:
    id: "AIChat.ContextualSheet"
- assertNotVisible:
    id: "AIChat.ContextChip.AttachedTitle"

- tapOn: "Attach"
- tapOn: "Ask About Page"
- extendedWaitUntil:
    visible:
        id: "AIChat.ContextChip.AttachedTitle"
    timeout: 10000

- tapOn:
    id: "searchEntry"
- inputText: "First contextual UTI prompt"
- tapOn:
    id: "AIChat.Toolbar.Button.Submit"

- runFlow:
    file: ../shared/dismiss_chat_open_modals.yaml

- tapOn:
    id: "AIChat.ContextualSheet.CloseButton"
- waitForAnimationToEnd:
    timeout: 3000

- tapOn:
    id: "searchEntry"
- inputText: "https://privacy-test-pages.site/security/address-bar-spoofing/index.html"
- pressKey: Enter
- assertVisible: ".*Address Bar Spoofing.*"

- tapOn:
    id: "Browser.OmniBar.Button.AIChat"
- assertVisible:
    id: "AIChat.ContextualSheet"
- assertNotVisible:
    id: "AIChat.ContextChip.AttachedTitle"
- assertNotVisible:
    id: "AIChat.ContextChip.Placeholder"

- tapOn: "Attach"
- assertVisible: "Ask About Page"
