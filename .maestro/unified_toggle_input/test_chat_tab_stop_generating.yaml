appId: com.duckduckgo.mobile.ios
# TEMPORARILY DISABLED from gating CI: the `release` tag (which the e2e job includes) is removed
# on purpose. This flow is non-deterministic — it races a live backend for the "Stop generating"
# button and depends on the Duck.ai web consent which only appears intermittently. Re-enable by
# restoring the `- release` tag once it no longer depends on live generation / web consent
# (follow-up task to be created).
tags:
    - iphone
    - unified_toggle_input
name: test_chat_tab_stop_generating

---

- runFlow:
    file: ../shared/open_chat_tab.yaml

- assertVisible:
    id: "AIChat.Toolbar.Button.ModelChip"

# Submit a prompt long enough that generation is still in progress when we stop it.
- tapOn:
    id: "searchEntry"
- inputText: "Explain the life cycle of a duck in detail."
- tapOn: "Submit"

# First send on a clearState device shows the anonymous-chat consent. Accepting it dispatches
# the pending prompt (verified on-device: no re-submit needed).
- runFlow:
    when:
        visible: "Agree"
    commands:
        - tapOn: "Agree"

# The Stop button appears while the live model is generating; tap it.
# NOTE: this races a live backend response and is inherently latency/availability dependent.
# It is acceptable for the nightly release job but is not a deterministic gate.
- extendedWaitUntil:
    visible: "Stop generating"
    timeout: 15000
- tapOn: "Stop generating"

# Generation halts: the Stop control disappears and the user's prompt bubble remains.
- extendedWaitUntil:
    notVisible: "Stop generating"
    timeout: 10000
- assertVisible: "Explain the life cycle of a duck in detail."
