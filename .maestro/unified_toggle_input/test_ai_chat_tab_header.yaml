appId: com.duckduckgo.mobile.ios
tags:
    - iphone
    - release
    - unified_toggle_input
name: test_ai_chat_tab_header

---

- runFlow:
    file: ../shared/open_chat_tab.yaml

# Step 1: Verify Duck.ai chat tab header elements
- assertVisible: "Free Plan"
- assertVisible: "Upgrade"
- assertVisible: "Close tab"
- assertVisible: "Recent chats"
- assertVisible: "New"

# Step 2: Chat-mode input shows the model chip and NO Search/Duck.ai toggle
- assertVisible:
    id: "AIChat.Toolbar.Button.ModelChip"
- assertNotVisible:
    id: "AddressBar.Button.DuckAI"

# Step 3: Close-tab button dismisses the chat tab and restores the omnibar
- tapOn: "Close tab"
- assertVisible:
    id: "Browser.OmniBar.Button.AIChat"
