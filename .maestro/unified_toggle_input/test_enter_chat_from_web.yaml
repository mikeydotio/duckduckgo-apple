appId: com.duckduckgo.mobile.ios
tags:
    - iphone
    - release
    - unified_toggle_input
name: test_enter_chat_from_web

---

- launchApp:
    appId: "com.duckduckgo.mobile.ios"
    clearState: true
    clearKeychain: true
    arguments:
        isOnboardingCompleted: ${ONBOARDING_COMPLETED}
        currentAppVariant: ${APP_VARIANT}
        isRunningUITests: true
        ff.browsingMenuSheetEnabledByDefault: "true"
        ff.unifiedToggleInput: "true"

# Dismiss any launch-time modals
- runFlow:
    file: ../shared/dismiss_chat_open_modals.yaml

# Load a web page
- tapOn:
    id: "searchEntry"
- inputText: "https://privacy-test-pages.site"
- pressKey: Enter
- assertVisible: ".*Privacy Test Pages.*"

# Open chat from the Browsing Menu while on a web page
- tapOn: "Browsing Menu"
- assertVisible: "Duck.ai"
- tapOn: "Duck.ai"

# Dismiss any modals that appear when the chat tab opens for the first time
# (same canonical sequence as every other chat-open flow, so the dismissal count can't drift).
- runFlow:
    file: ../shared/dismiss_chat_open_modals.yaml

# Verify Duck.ai chat tab is now open
- assertVisible: "Close tab"
- assertVisible: "Free Plan"
- assertVisible:
    id: "AIChat.Toolbar.Button.ModelChip"
