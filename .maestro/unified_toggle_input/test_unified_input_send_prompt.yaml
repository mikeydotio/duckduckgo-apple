appId: com.duckduckgo.mobile.ios
tags:
    - iphone
    - release
    - unified_toggle_input
name: test_unified_input_send_prompt

---

- launchApp:
    appId: "com.duckduckgo.mobile.ios"
    clearState: true
    clearKeychain: true
    arguments:
        isOnboardingCompleted: ${ONBOARDING_COMPLETED}
        currentAppVariant: ${APP_VARIANT}
        isRunningUITests: true
        ff.browsingMenuSheetEnabledByDefault: "true"
        ff.unifiedToggleInput: "true"
        ff.experimentalAddressBar: "true"

# Dismiss any launch-time modal BEFORE navigating the Browsing Menu.
- runFlow:
    file: ../shared/dismiss_chat_open_modals.yaml

- runFlow:
    file: ../shared/set_search_and_duckai.yaml

# Focus NTP omnibar and switch to Duck.ai mode
- tapOn:
    id: "searchEntry"
- assertVisible:
    id: "AddressBar.Button.DuckAI"
- tapOn:
    id: "AddressBar.Button.DuckAI"
- assertVisible:
    id: "AIChat.Toolbar.Button.ModelChip"

# Type a prompt (verify it lands in the input) and submit
- inputText: "What is a duck?"
- assertVisible: "What is a duck?"
- tapOn: "Submit"

# First send on a clearState device shows the anonymous-chat consent. Accepting it dispatches
# the pending prompt (verified on-device: no re-submit needed).
- runFlow:
    when:
        visible: "Agree"
    commands:
        - tapOn: "Agree"

# Confirm we transitioned to the Duck.ai chat tab AND the prompt rendered as a user message
# bubble (the input clears on send, so this matches the conversation bubble, not the input).
- assertVisible: "Close tab"
- assertVisible: "What is a duck?"
