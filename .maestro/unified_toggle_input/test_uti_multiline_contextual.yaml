appId: com.duckduckgo.mobile.ios
tags:
    - iphone
    - release
    - unified_toggle_input
name: test_uti_multiline_contextual

---

# Verifies that the contextual Duck.ai entry (opened from a web page, toggle disabled,
# aiChat mode) uses the multi-line UITextView composer — no toggle shown, text expands.

- launchApp:
    appId: "com.duckduckgo.mobile.ios"
    clearState: true
    clearKeychain: true
    arguments:
        isOnboardingCompleted: ${ONBOARDING_COMPLETED}
        currentAppVariant: ${APP_VARIANT}
        isRunningUITests: true
        ff.browsingMenuSheetEnabledByDefault: "true"
        ff.unifiedToggleInput: "true"

- runFlow:
    file: ../shared/dismiss_chat_open_modals.yaml

# Navigate to a web page so Duck.ai opens in contextual mode
- tapOn:
    id: "searchEntry"
- inputText: "https://privacy-test-pages.site"
- pressKey: Enter
- assertVisible: ".*Privacy Test Pages.*"

# Open Duck.ai from the Browsing Menu — contextual entry, toggle disabled, aiChat mode
- tapOn: "Browsing Menu"
- tapOn: "Duck.ai"

- runFlow:
    file: ../shared/dismiss_chat_open_modals.yaml

# AI toolbar confirms multi-line / aiChat mode (no Search↔Duck.ai toggle)
- assertVisible:
    id: "AIChat.Toolbar.Button.ModelChip"
- assertNotVisible:
    id: "AddressBar.Button.Search"
- assertNotVisible:
    id: "AddressBar.Button.DuckAI"

# Focus the input and type a long URL — multi-line composer expands to show it
- tapOn:
    id: "searchEntry"
- inputText: "https://en.wikipedia.org/wiki/Llanfairpwllgwyngyllgogerychwyrndrobwllllantysiliogogogoch"

# Multi-line toolbar remains visible after typing
- assertVisible:
    id: "AIChat.Toolbar.Button.ModelChip"
