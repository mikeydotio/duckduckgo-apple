name: CodeQL

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  analyze-swift:
    name: Analyze ${{ matrix.name }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS
            category: swift/ios-browser
            runs-on: macos-26
            working-directory: iOS
            package-resolved: iOS/DuckDuckGo-iOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
            spm-cache-path: iOS/DerivedData/SourcePackages
            spm-cache-prefix: ios
            scheme: iOS Browser
            destination: ios-simulator
            configuration: Debug
          - name: macOS
            category: swift/macos-browser
            runs-on: macos-26
            working-directory: macOS
            package-resolved: macOS/DuckDuckGo-macOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
            spm-cache-path: macOS/DerivedData/SourcePackages
            spm-cache-prefix: macos
            scheme: macOS Browser
            destination: platform=macOS
            configuration: CI

    steps:
      - name: Register SSH keys for private repos
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY_FASTLANE_MATCH }}
            ${{ secrets.SSH_PRIVATE_KEY_DUCKSANS_FONT }}

      - name: Check out the code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set cache key hash
        run: |
          has_only_tags=$(jq '[ .pins[].state | has("version") ] | all' "${{ matrix.package-resolved }}")
          if [[ "$has_only_tags" == "true" ]]; then
            echo "cache_key_hash=${{ hashFiles(matrix.package-resolved) }}" >> "$GITHUB_ENV"
          else
            echo "Package.resolved contains dependencies specified by branch or commit, skipping cache."
          fi

      - name: Cache SPM
        if: env.cache_key_hash
        uses: actions/cache@v4
        with:
          path: ${{ matrix.spm-cache-path }}
          key: ${{ runner.os }}-${{ matrix.spm-cache-prefix }}-${{ env.cache_key_hash }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.spm-cache-prefix }}-

      - name: Select Xcode
        uses: ./.github/actions/select-xcode-version

      - name: Select iOS Simulator
        if: matrix.destination == 'ios-simulator'
        id: select-simulator
        uses: ./.github/actions/select-ios-simulator
        with:
          preferred-versions: "26.4"

      - name: Resolve iOS package dependencies
        if: matrix.destination == 'ios-simulator'
        working-directory: ${{ matrix.working-directory }}
        run: |
          echo "Using iOS simulator: ${{ steps.select-simulator.outputs.ios-version }}"
          echo "Destination: ${{ steps.select-simulator.outputs.destination }}"

          xcodebuild -resolvePackageDependencies \
            -scheme "${{ matrix.scheme }}" \
            -destination "${{ steps.select-simulator.outputs.destination }}" \
            -derivedDataPath "DerivedData" \
            -configuration "${{ matrix.configuration }}" \
            -skipPackagePluginValidation \
            -skipMacroValidation

      - name: Resolve macOS package dependencies
        if: matrix.destination != 'ios-simulator'
        working-directory: ${{ matrix.working-directory }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme "${{ matrix.scheme }}" \
            -destination "${{ matrix.destination }}" \
            -derivedDataPath "DerivedData" \
            -configuration "${{ matrix.configuration }}" \
            -skipPackagePluginValidation \
            -skipMacroValidation

      - name: Setup Ruby and dependencies
        if: matrix.destination == 'ios-simulator' || matrix.working-directory == 'macOS'
        uses: ./.github/actions/setup-ruby
        with:
          working-directory: ${{ matrix.working-directory }}
          cache-key-prefix: ${{ matrix.spm-cache-prefix }}-ruby

      - name: Sync iOS code signing assets
        if: matrix.destination == 'ios-simulator'
        working-directory: ${{ matrix.working-directory }}
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: bundle exec fastlane sync_signing

      - name: Sync macOS code signing assets
        if: matrix.working-directory == 'macOS'
        id: sync-macos-signing-first-attempt
        continue-on-error: true
        working-directory: ${{ matrix.working-directory }}
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          SSH_PRIVATE_KEY_FASTLANE_MATCH: ${{ secrets.SSH_PRIVATE_KEY_FASTLANE_MATCH }}
        run: bundle exec fastlane sync_signing_ci

      - name: Retry syncing macOS code signing assets
        if: matrix.working-directory == 'macOS' && steps.sync-macos-signing-first-attempt.outcome == 'failure'
        working-directory: ${{ matrix.working-directory }}
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER: ${{ secrets.APPLE_API_KEY_ISSUER }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          SSH_PRIVATE_KEY_FASTLANE_MATCH: ${{ secrets.SSH_PRIVATE_KEY_FASTLANE_MATCH }}
        run: |
          echo "First attempt to sync macOS code signing assets failed. Retrying..."
          bundle exec fastlane sync_signing_ci

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual
          queries: security-extended

      - name: Build iOS for CodeQL
        if: matrix.destination == 'ios-simulator'
        working-directory: ${{ matrix.working-directory }}
        run: |
          echo "Using iOS simulator: ${{ steps.select-simulator.outputs.ios-version }}"
          echo "Destination: ${{ steps.select-simulator.outputs.destination }}"

          xcodebuild build \
            -scheme "${{ matrix.scheme }}" \
            -destination "${{ steps.select-simulator.outputs.destination }}" \
            -derivedDataPath "DerivedData" \
            -configuration "${{ matrix.configuration }}" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            -disableAutomaticPackageResolution \
            ONLY_ACTIVE_ARCH=YES \
            OTHER_CODE_SIGN_FLAGS=--timestamp=none

      - name: Build macOS for CodeQL
        if: matrix.destination != 'ios-simulator'
        working-directory: ${{ matrix.working-directory }}
        run: |
          xcodebuild build \
            -scheme "${{ matrix.scheme }}" \
            -destination "${{ matrix.destination }}" \
            -derivedDataPath "DerivedData" \
            -configuration "${{ matrix.configuration }}" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            -disableAutomaticPackageResolution \
            ONLY_ACTIVE_ARCH=YES \
            OTHER_CODE_SIGN_FLAGS=--timestamp=none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: ${{ matrix.category }}
