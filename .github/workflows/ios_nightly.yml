name: iOS - Nightly Tests

defaults:
  run:
    working-directory: iOS

on:
  workflow_dispatch:
    inputs:
      user_modes:
        description: "User mode(s) to run. 'production' = production behaviour (release-gating). 'internal' = isInternalUser=true, runs internally-gated features (advance warning). 'both' = run both legs."
        type: choice
        default: production
        options:
        - production
        - internal
        - both
  schedule:
    - cron: '0 2 * * *' # Run at 2 AM UTC

jobs:
  setup-user-modes:
    name: Resolve user modes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    outputs:
      user-modes: ${{ steps.define.outputs.user-modes }}
    steps:
    - name: Define user-modes
      id: define
      run: |
        event="${{ github.event_name }}"
        input_modes="${{ inputs.user_modes }}"
        case "$event" in
          schedule)
            user_modes='["production", "internal"]'
            ;;
          workflow_dispatch)
            case "$input_modes" in
              internal) user_modes='["internal"]' ;;
              both)     user_modes='["production", "internal"]' ;;
              *)        user_modes='["production"]' ;;
            esac
            ;;
          *)
            user_modes='["production"]'
            ;;
        esac
        echo "user-modes=${user_modes}" >> $GITHUB_OUTPUT
        echo "Resolved user-modes: ${user_modes}"

  atb-ui-tests:
    name: ATB UI Tests${{ matrix.user-mode == 'internal' && ' (internal)' || '' }}
    needs: setup-user-modes
    runs-on: macos-26-xlarge
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        user-mode: ${{ fromJSON(needs.setup-user-modes.outputs.user-modes) }}

    continue-on-error: ${{ matrix.user-mode == 'internal' }}

    steps:
    - name: Register SSH keys for private repos
      uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_DUCKSANS_FONT }}

    - name: Check out the code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Set cache key hash
      run: |
         has_only_tags=$(jq '[ .pins[].state | has("version") ] | all' DuckDuckGo-iOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved)
         if [[ "$has_only_tags" == "true" ]]; then
           echo "cache_key_hash=${{ hashFiles('iOS/DuckDuckGo-iOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}" >> $GITHUB_ENV
         else
           echo "Package.resolved contains dependencies specified by branch or commit, skipping cache."
         fi

    - name: Cache SPM
      if: env.cache_key_hash
      uses: actions/cache@v4
      with:
        path: iOS/DerivedData/SourcePackages
        key: ${{ runner.os }}-ios-${{ matrix.user-mode }}-${{ env.cache_key_hash }}
        restore-keys: |
          ${{ runner.os }}-ios-${{ matrix.user-mode }}-
          ${{ runner.os }}-ios-

    - name: Select Xcode
      uses: ./.github/actions/select-xcode-version

    - name: Select iOS Simulator
      id: select-simulator
      uses: ./.github/actions/select-ios-simulator
      with:
        preferred-versions: "26.4"

    - name: Boot iOS Simulator for log collection
      id: boot-simulator
      uses: ./.github/actions/ios-simulator-logs
      with:
        action: boot
        device-name: iPhone 17
        ios-version: ${{ steps.select-simulator.outputs.ios-version }}

    - name: Build and test
      id: run-unit-tests
      run: |
        set -o pipefail && xcodebuild test \
          -scheme "iOS ATB UI Tests" \
          -destination "platform=iOS Simulator,id=${{ steps.boot-simulator.outputs.device-id }}" \
          -derivedDataPath "DerivedData" \
          -skipPackagePluginValidation \
          -skipMacroValidation \
          OTHER_CODE_SIGN_FLAGS=--timestamp=none \
          "TEST_RUNNER_INTERNAL_USER_MODE=${{ matrix.user-mode == 'internal' && 'true' || 'false' }}" \
          | tee xcodebuild.log \
          | xcbeautify --report junit --report-path . --junit-report-filename unittests.xml

    - name: Collect simulator logs
      id: collect-logs
      if: always()
      uses: ./.github/actions/ios-simulator-logs
      with:
        action: collect
        device-id: ${{ steps.boot-simulator.outputs.device-id }}

    - name: Upload logs if workflow failed
      uses: actions/upload-artifact@v4
      if: failure() || cancelled()
      with:
        name: ATBBuildLogs-${{ matrix.user-mode }}
        path: |
          iOS/xcodebuild.log
          iOS/DerivedData/Logs/Test/*.xcresult
          ${{ steps.collect-logs.outputs.log-path }}
        retention-days: 7

    - name: Upload crash reports
      uses: actions/upload-artifact@v4
      if: failure() || cancelled()
      with:
        name: ios-nightly-crash-reports-${{ matrix.user-mode }}
        path: |
          ~/Library/Logs/DiagnosticReports/*.ips
          ~/Library/Logs/DiagnosticReports/*.crash
        if-no-files-found: ignore
        retention-days: 7

    - name: Mark user-mode failure
      if: (failure() || cancelled()) && github.ref_name == 'main'
      working-directory: ${{ github.workspace }}
      run: |
        mkdir -p failure-marker
        echo "atb:${{ matrix.user-mode }}" > failure-marker/marker.txt
    - name: Upload failure marker
      if: (failure() || cancelled()) && github.ref_name == 'main'
      uses: actions/upload-artifact@v4
      with:
        name: failure-marker-atb-${{ matrix.user-mode }}
        path: failure-marker/
        retention-days: 1

    - name: Process test results
      if: always()
      uses: ./.github/actions/process-test-results
      with:
        working-directory: iOS
        junit-path: unittests.xml
        log-path: xcodebuild.log
        title: iOS Nightly${{ matrix.user-mode == 'internal' && ' (internal)' || '' }}
        test-outcome: ${{ steps.run-unit-tests.outcome }}

    - name: Publish unit tests report
      uses: mikepenz/action-junit-report@v3
      if: always()
      with:
        report_paths: iOS/unittests.xml
        check_retries: true
        job_summary: 'false'

  notify-failure:
    name: Notify on failure
    if: ${{ always() && github.ref_name == 'main' }}
    needs: [atb-ui-tests]
    runs-on: ubuntu-latest

    steps:
    - name: Check out the code
      uses: actions/checkout@v6

    - name: Detect failure user-modes
      id: detect
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        artifacts=$(gh api --paginate "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --jq '.artifacts[].name' || true)
        has_production=false
        has_internal=false
        if echo "$artifacts" | grep -E '^failure-marker-atb-production' >/dev/null; then
          has_production=true
        fi
        if echo "$artifacts" | grep -E '^failure-marker-atb-internal' >/dev/null; then
          has_internal=true
        fi
        echo "has_production=$has_production" >> "$GITHUB_OUTPUT"
        echo "has_internal=$has_internal" >> "$GITHUB_OUTPUT"

    - name: Create Asana task for production-mode failure
      if: steps.detect.outputs.has_production == 'true'
      uses: duckduckgo/native-github-asana-sync@v1.1
      with:
        action: create-asana-task
        asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
        asana-project: ${{ vars.GH_ASANA_IOS_APP_PROJECT_ID }}
        asana-task-name: GH Workflow Failure - iOS Nightly Tests
        asana-task-description: The iOS Nightly Tests workflow has failed in production user mode. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Create Asana task for internal-mode failure
      if: steps.detect.outputs.has_internal == 'true'
      uses: duckduckgo/native-github-asana-sync@v1.1
      with:
        action: create-asana-task
        asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
        asana-project: ${{ vars.GH_ASANA_IOS_APP_PROJECT_ID }}
        asana-task-name: GH Workflow Failure - iOS Nightly Tests (internal mode, advance warning)
        asana-task-description: The internal-mode iOS Nightly leg has failed. Advance warning for a feature still gated to internal users. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
