name: macOS - UI Tests

defaults:
  run:
    working-directory: macOS

on:
  workflow_dispatch:
    inputs:
      all_os_versions:
        description: "Test all supported macOS versions (not just the latest)"
        type: boolean
        default: true
      single_test_class:
        description: "Run one or more UITestCases (optional, space-separated, e.g. 'AutocompleteTests' or 'AutocompleteTests BookmarksTests')"
        type: string
        required: false
      build-type:
        description: "Build type: 'dmg' for Developer ID DMG app, 'appstore' for sandboxed App Store app"
        type: choice
        default: dmg
        options:
        - dmg
        - appstore
      user_modes:
        description: "User mode(s) to run. 'production' = production behaviour (release-gating). 'internal' = isInternalUser=true, runs internally-gated features (advance warning). 'both' = run both legs."
        type: choice
        default: production
        options:
        - production
        - internal
        - both
  workflow_call:
    inputs:
      all_os_versions:
        description: "Test all supported macOS versions (not just the latest)"
        type: boolean
        default: true
      branch:
        description: "Branch name"
        required: false
        type: string
      single_test_class:
        description: "Run one or more UITestCases (optional, space-separated, e.g. 'AutocompleteTests' or 'AutocompleteTests BookmarksTests')"
        type: string
        required: false
      build-type:
        description: "Build type: 'dmg' for Developer ID DMG app, 'appstore' for sandboxed App Store app"
        type: string
        required: false
        default: dmg
      user_modes:
        description: "User mode(s) to run: 'production', 'internal', or 'both'"
        type: string
        required: false
        default: production
  schedule:
    - cron: '0 3 * * 1-5' # 3AM UTC offsetted to legacy to avoid action-junit-report@v4 bug
  push:
    branches: [ main, "release/macos/**", "hotfix/macos/**" ]
    paths:
      - 'SharedPackages/BrowserServicesKit/**'
      - 'macOS/**'
  pull_request:
    # opened, synchronize, reopened are the default triggering events for a pull request
    # We're also adding ready_for_review to run checks when a draft PR becomes ready for review.
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/**'
      - '.xcode-version'
      - 'SharedPackages/BrowserServicesKit/Package.swift'

concurrency:
  # When this workflow is called by another workflow (e.g. code freeze), `github.workflow` contains the name of the calling workflow,
  # and the value of `${{ github.workflow }}-${{ github.ref }}` would be the same for PR Checks and UI Tests, which would prevent them
  # from being run concurrently. We're adding a suffix here to tell PR Checks and UI Tests apart and allow for running the two
  # side by side in the code freeze workflow.
  group: ${{ github.workflow }}-${{ github.ref }}-ui-tests-${{ inputs.build-type }}
  cancel-in-progress: true

jobs:
  should-run-checks:
    name: Determine if checks should run
    uses: ./.github/workflows/should_run_pr_checks.yml

  create-notarized-app:
    name: Build Notarized Review app (${{ inputs.build-type }})

    needs: should-run-checks
    if: needs.should-run-checks.outputs.should_run == 'true'

    uses: ./.github/workflows/macos_build_notarized.yml
    with:
      release-type: "${{ inputs.build-type == 'appstore' && 'sandbox-review' || 'review' }}" # Use sandbox-review release-type for App Store UI Tests
      create-dmg: false
      branch: ${{ inputs.branch || github.sha }}
      skip-notify: true
    secrets: inherit

  # This job sets up the matrix strategy arguments for the ui-tests jobs
  setup-tests:
    name: Set up tests list
    runs-on: macos-26

    needs: should-run-checks
    if: needs.should-run-checks.outputs.should_run == 'true'

    outputs:
      runner: ${{ steps.define-runners.outputs.runner }}
      include: ${{ steps.define-runners.outputs.include }}
      test: ${{ steps.list-tests.outputs.test }}
      all-os-versions: ${{ steps.define-runners.outputs.all-os-versions }}
      start-timestamp: ${{ steps.start-duration.outputs.start-timestamp }}
      # The UI Tests matrix runs each user mode as a separate job (ui-tests-production /
      # ui-tests-internal) so that a single matrix never exceeds GitHub's 256-configuration limit.
      # Each flag says whether that mode was requested; the matching job is skipped when it is false.
      run-production: ${{ steps.define-user-modes.outputs.run-production }}
      run-internal: ${{ steps.define-user-modes.outputs.run-internal }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch || github.sha }}

      - name: Start measuring duration
        id: start-duration
        uses: ./.github/actions/measure-duration
        with:
          mode: start

      - name: Define runners
        id: define-runners
        run: |
          # scheduled runs don't have inputs so let's default to true for all_os_versions
          all_os_versions="${{ inputs.all_os_versions || 'true' }}"
          if [[ "${{ github.event_name }}" == "pull_request" || "${{ github.event_name }}" == "push" || "$all_os_versions" == "false" ]]; then
            all_os_versions='false'
            runner='["macos-26-xlarge"]'
            include='[{"runner": "macos-26-xlarge", "os-version": "26", "xcode-version": "26.4"}]'
          else
            all_os_versions='true'
            runner='["macos-14-xlarge", "macos-15-xlarge", "macos-26-xlarge"]'
            include=$(jq -c <<< '[
              {"runner": "macos-14-xlarge", "os-version": "14", "xcode-version": "15.4"},
              {"runner": "macos-15-xlarge", "os-version": "15", "xcode-version": "26.2"},
              {"runner": "macos-26-xlarge", "os-version": "26", "xcode-version": "26.4"}
            ]')
          fi
          echo "all-os-versions=${all_os_versions}" >> $GITHUB_OUTPUT
          echo "runner=${runner}" >> $GITHUB_OUTPUT
          echo "include=${include}" >> $GITHUB_OUTPUT

      - name: Define user-modes
        id: define-user-modes
        run: |
          event="${{ github.event_name }}"
          input_modes="${{ inputs.user_modes }}"
          case "$event" in
            schedule)
              user_modes='["production", "internal"]'
              ;;
            workflow_dispatch|workflow_call)
              case "$input_modes" in
                internal) user_modes='["internal"]' ;;
                both)     user_modes='["production", "internal"]' ;;
                *)        user_modes='["production"]' ;;
              esac
              ;;
            *)
              user_modes='["production"]'
              ;;
          esac
          # Each user mode runs as its own job (ui-tests-production / ui-tests-internal). Running
          # both in a single matrix would produce more configs than GitHub's 256 limit, so they are split;
          # each job is gated on whether its mode was requested.
          run_production=$(jq -r 'any(.[]; . == "production")' <<< "$user_modes")
          run_internal=$(jq -r 'any(.[]; . == "internal")' <<< "$user_modes")
          echo "run-production=${run_production}" >> $GITHUB_OUTPUT
          echo "run-internal=${run_internal}" >> $GITHUB_OUTPUT
          echo "Resolved user modes: ${user_modes} (production=${run_production}, internal=${run_internal})"

      - name: List tests
        id: list-tests
        run: |
          # Check if one or more test classes were specified
          single_test_class="${{ inputs.single_test_class }}"

          if [[ -n "$single_test_class" ]]; then
            echo "Running specified test class(es): $single_test_class"
            test=$(echo $single_test_class | jq -cR 'split(" ")')
          else
            # Find all test classes that inherit from UITestCase
            # Fail if any test classes inherit directly from XCTestCase

            # Check for invalid XCTestCase usage (classes inheriting from XCTestCase but not UITestCase)
            xctest_classes=$(grep -r "class.*:.*XCTestCase" UITests --include="*.swift" | grep -v "class UITestCase:" || true)
            if [[ -n "$xctest_classes" ]]; then
              echo "❌ Error: Found test classes inheriting directly from XCTestCase instead of UITestCase:"
              echo "$xctest_classes"
              echo ""
              echo "All test classes should inherit from UITestCase, not XCTestCase."
              exit 1
            fi

            # Extract test class names that inherit from UITestCase
            test_names=$(grep -rh "class.*:.*UITestCase" UITests --include="*.swift" \
              | sed -E 's/^[^c]*class[[:space:]]+([A-Za-z0-9_]+)[[:space:]]*:.*/\1/' \
              | sort -u \
              | tr '\n' ' ')

            if [[ -z "$test_names" ]]; then
              echo "❌ Error: No UITestCase-derived test classes found"
              exit 1
            fi

            test=$(echo $test_names | jq -cR 'split(" ") | map(select(length > 0))')
            echo "Found test classes: $test_names"
          fi

          echo "test=${test}" >> $GITHUB_OUTPUT

  # UI Tests run as two jobs, one per user mode, each calling the reusable macos_run_ui_test.yml
  # helper once per (runner x test) combination. Both modes in a single matrix would exceed GitHub's
  # 256-configuration limit.
  # Each job runs only when its mode was requested (production by default; internal for
  # user_modes=internal/both and the scheduled run). Internal-mode failures stay non-gating via
  # continue-on-error inside the helper's job.
  ui-tests-production:
    name: UI Tests
    needs: [create-notarized-app, setup-tests]
    if: needs.setup-tests.outputs.run-production == 'true'
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(needs.setup-tests.outputs.runner) }}
        test: ${{ fromJSON(needs.setup-tests.outputs.test) }}
        include: ${{ fromJSON(needs.setup-tests.outputs.include) }}
    uses: ./.github/workflows/macos_run_ui_test.yml
    with:
      runner: ${{ matrix.runner }}
      os-version: ${{ matrix.os-version }}
      xcode-version: ${{ matrix.xcode-version }}
      test: ${{ matrix.test }}
      user-mode: production
      build-type: ${{ inputs.build-type || 'dmg' }}
      branch: ${{ inputs.branch || github.sha }}
    secrets: inherit

  ui-tests-internal:
    name: UI Tests
    needs: [create-notarized-app, setup-tests]
    if: needs.setup-tests.outputs.run-internal == 'true'
    strategy:
      fail-fast: false
      matrix:
        runner: ${{ fromJSON(needs.setup-tests.outputs.runner) }}
        test: ${{ fromJSON(needs.setup-tests.outputs.test) }}
        include: ${{ fromJSON(needs.setup-tests.outputs.include) }}
    uses: ./.github/workflows/macos_run_ui_test.yml
    with:
      runner: ${{ matrix.runner }}
      os-version: ${{ matrix.os-version }}
      xcode-version: ${{ matrix.xcode-version }}
      test: ${{ matrix.test }}
      user-mode: internal
      build-type: ${{ inputs.build-type || 'dmg' }}
      branch: ${{ inputs.branch || github.sha }}
    secrets: inherit

  test-report:
    name: Report test results
    if: always() && needs.should-run-checks.outputs.should_run == 'true'
    needs: [should-run-checks, setup-tests, ui-tests-production, ui-tests-internal]
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.branch || github.sha }}

    - name: Download test reports
      uses: actions/download-artifact@v4
      if: always()
      with:
        pattern: "testreport-*"
        merge-multiple: true

    - name: Publish tests report
      uses: mikepenz/action-junit-report@v5
      if: always()
      with:
        check_name: Tests Report
        report_paths: "*.xml"
        check_retries: true
        group_reports: false
        flaky_summary: true
        verbose_summary: false
        include_time_in_summary: true
        skip_annotations: true

    - name: Report workflow duration
      continue-on-error: true
      uses: ./.github/actions/measure-duration
      with:
        mode: stop
        start-timestamp: ${{ needs.setup-tests.outputs.start-timestamp }}
        pixel-name: ${{ (needs.setup-tests.outputs.all-os-versions == true) && 'm_ci_apple_duration_macos_ui_tests_all' || 'm_ci_apple_duration_macos_ui_tests_latest' }}

  notify-failure:
    name: Notify on failure
    if: ${{ always() && github.event_name == 'schedule' }}
    needs: [ui-tests-production, ui-tests-internal]
    runs-on: ubuntu-latest

    steps:
    - name: Check out the code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.branch || github.sha }}

    - name: Detect failure user-modes
      id: detect
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        artifacts=$(gh api --paginate "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --jq '.artifacts[].name' || true)
        has_production=false
        has_internal=false
        if echo "$artifacts" | grep -E '^failure-marker-macos-ui-production' >/dev/null; then
          has_production=true
        fi
        if echo "$artifacts" | grep -E '^failure-marker-macos-ui-internal' >/dev/null; then
          has_internal=true
        fi
        echo "has_production=$has_production" >> "$GITHUB_OUTPUT"
        echo "has_internal=$has_internal" >> "$GITHUB_OUTPUT"

    - name: Create Asana task for production-mode failure
      if: steps.detect.outputs.has_production == 'true'
      uses: duckduckgo/native-github-asana-sync@v1.1
      with:
        action: create-asana-task
        asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
        asana-project: ${{ vars.MACOS_APP_DEVELOPMENT_ASANA_PROJECT_ID }}
        asana-task-name: GH Workflow Failure - UI Tests
        asana-task-description: The UI Tests workflow has failed in production user mode. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: Create Asana task for internal-mode failure
      if: steps.detect.outputs.has_internal == 'true'
      uses: duckduckgo/native-github-asana-sync@v1.1
      with:
        action: create-asana-task
        asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
        asana-project: ${{ vars.MACOS_APP_DEVELOPMENT_ASANA_PROJECT_ID }}
        asana-task-name: GH Workflow Failure - UI Tests (internal mode, advance warning)
        asana-task-description: The internal-mode UI Tests leg has failed. Advance warning for a feature still gated to internal users. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
