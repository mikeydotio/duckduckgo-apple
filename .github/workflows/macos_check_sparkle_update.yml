name: Check Sparkle Update

on:
  # schedule:
  #   - cron: '0 9 * * 1'  # Every Monday at 9:00 UTC
  workflow_dispatch:
  push:  # Temporary: remove after testing
    branches:
      - diego/automate-sparkle-updates-pr

permissions:
  contents: write
  pull-requests: write

jobs:
  check-and-update:
    runs-on: macos-15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for Sparkle update
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/sparkle/check_sparkle_update.sh

      - name: Resolve SPM packages
        if: steps.check.outputs.update_available == 'true'
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace DuckDuckGo.xcworkspace \
            -scheme "macOS Browser"

      - name: Create Pull Request
        id: create-pr
        if: steps.check.outputs.update_available == 'true'
        uses: peter-evans/create-pull-request@88bf0de51c7487d91e1abbb4899332e602c58bbf
        with:
          commit-message: "Update Sparkle to ${{ steps.check.outputs.latest_version }}"
          committer: Dax the Duck <dax@duckduckgo.com>
          author: Dax the Duck <dax@duckduckgo.com>
          branch: automation/sparkle-update-${{ steps.check.outputs.latest_version }}
          title: "Update Sparkle to ${{ steps.check.outputs.latest_version }}"
          body: |
            Updates Sparkle from `${{ steps.check.outputs.current_version }}` to `${{ steps.check.outputs.latest_version }}` (${{ steps.check.outputs.bump_type }} update).

            [Compare changes on GitHub](https://github.com/sparkle-project/Sparkle/compare/${{ steps.check.outputs.current_version }}...${{ steps.check.outputs.latest_version }})

            ---

            ${{ steps.check.outputs.release_notes }}
          labels: dependencies,macOS${{ steps.check.outputs.bump_type == 'major' && ',breaking' || '' }}
          draft: false

      - name: Get CODEOWNERS for AppUpdater
        id: codeowner
        if: steps.create-pr.outputs.pull-request-url
        run: |
          owner=$(grep 'macOS/LocalPackages/AppUpdater/' .github/CODEOWNERS | awk '{print $2}' | sed 's/@//')
          echo "github-handle=${owner}" >> "$GITHUB_OUTPUT"

      - name: Get Asana user ID for CODEOWNERS
        id: asana-user
        if: steps.codeowner.outputs.github-handle
        uses: duckduckgo/apple-toolbox/actions/asana-get-user-id-for-github-handle@main
        with:
          access-token: ${{ secrets.ASANA_ACCESS_TOKEN }}
          github-handle: ${{ steps.codeowner.outputs.github-handle }}

      - name: Create Asana subtask
        if: steps.create-pr.outputs.pull-request-url
        env:
          ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
        run: |
          assignee_field=""
          if [[ -n "${{ steps.asana-user.outputs.user-id }}" ]]; then
            assignee_field="\"assignee\": \"${{ steps.asana-user.outputs.user-id }}\","
          fi
          curl -fLSs "https://app.asana.com/api/1.0/tasks" \
            --header "Accept: application/json" \
            --header "Authorization: Bearer ${ASANA_ACCESS_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "{
              \"data\": {
                ${assignee_field}
                \"parent\": \"1212461351428211\",
                \"name\": \"Update Sparkle to ${{ steps.check.outputs.latest_version }}\",
                \"notes\": \"Automated PR: ${{ steps.create-pr.outputs.pull-request-url }}\n\nUpdate type: ${{ steps.check.outputs.bump_type }}\nFrom: ${{ steps.check.outputs.current_version }}\nTo: ${{ steps.check.outputs.latest_version }}\"
              }
            }"
