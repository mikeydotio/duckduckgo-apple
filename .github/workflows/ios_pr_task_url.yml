name: iOS - Asana PR Task URL

on:
  pull_request:
    types: [opened, edited, closed, synchronize, review_requested, ready_for_review]
    paths:
      - '.github/**'
      - 'SharedPackages/**'
      - 'iOS/**'

jobs:
  asana-pr-task-url:
    name: Manage Asana PR Task URL
    uses: ./.github/workflows/shared_asana_pr_task_url.yml
    secrets: inherit
    with:
      asana-project-id: ${{ vars.IOS_APP_BOARD_ASANA_PROJECT_ID }}
      asana-pr-section-id: ${{ vars.IOS_APP_BOARD_PR_SECTION_ID }}
      asana-waiting-for-release-section-id: ${{ vars.IOS_APP_BOARD_WAITING_FOR_RELEASE_SECTION_ID }}
