name: Dependabot PR Instructions
on:
  pull_request:
    types: [opened]
jobs:
  add-instructions:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Prepend CI instructions to PR body
        uses: actions/github-script@v7
        with:
          script: |
            const prefix = `> **Dependabot SSH access Workaround:**
            >
            > 1. Check out this branch locally
            > 2. Push an empty commit: \`git commit -m "Ping" --allow-empty\`
            > 

            ---

            `;
            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: context.payload.pull_request.number,
            });
            if ((pr.body || '').includes('Dependabot SSH access Workaround')) return;
            await github.rest.pulls.update({
              ...context.repo,
              pull_number: context.payload.pull_request.number,
              body: prefix + (pr.body || ''),
            });
