name: iOS - End-to-End tests

defaults:
  run:
    working-directory: iOS

on:
  schedule:
    - cron: '0 4 * * *' # run at 4 AM UTC
  workflow_dispatch:
    inputs:
      user_modes:
        description: "User mode(s) to run. 'production' = production behaviour (release-gating). 'internal' = isInternalUser=true, runs internally-gated features (advance warning). 'both' = run both legs."
        type: choice
        default: production
        options:
        - production
        - internal
        - both
      test_tags:
        description: "Comma-separated suite tags to run in isolation (e.g. 'release' or 'release,privacy'). Leave empty to run all suites.
        type: string
        default: ""
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-end-to-end-tests:
    name: Build End to End Tests
    runs-on: macos-26
    timeout-minutes: 30

    env:
      RUNS_ON: macos-26 # keep this in sync with runs-on above

    steps:
    - name: Register SSH keys for private repos
      uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_DUCKSANS_FONT }}

    - name: Check out the code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Start measuring duration
      id: start-duration
      uses: ./.github/actions/measure-duration
      with:
        mode: start

    - name: Set cache key hash
      run: |
         has_only_tags=$(jq '[ .pins[].state | has("version") ] | all' DuckDuckGo-iOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved)
         if [[ "$has_only_tags" == "true" ]]; then
           echo "cache_key_hash=${{ hashFiles('iOS/DuckDuckGo-iOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}" >> $GITHUB_ENV
         else
           echo "Package.resolved contains dependencies specified by branch or commit, skipping cache."
         fi

    - name: Cache SPM
      if: env.cache_key_hash
      uses: actions/cache@v4
      with:
        path: iOS/DerivedData/SourcePackages
        key: ${{ runner.os }}-ios-${{ env.cache_key_hash }}
        restore-keys: |
          ${{ runner.os }}-ios-

    - name: Select Xcode
      uses: ./.github/actions/select-xcode-version

    - name: Select iOS Simulator
      id: select-simulator
      uses: ./.github/actions/select-ios-simulator
      with:
        preferred-versions: "26.4"

    - name: Restore Xcode Compilation Cache
      uses: actions/cache/restore@v4
      with:
        path: iOS/DerivedData/CompilationCache.noindex
        key: xcode-compilation-cache-ios-e2e
        restore-keys: |
          xcode-compilation-cache-ios-e2e-

    - name: Build for tests
      run: |
        echo "Using iOS simulator: ${{ steps.select-simulator.outputs.ios-version }}"
        echo "Destination: ${{ steps.select-simulator.outputs.destination }}"

        set -o pipefail && xcodebuild \
          -scheme "iOS Browser" \
          -destination "${{ steps.select-simulator.outputs.destination }}" \
          -derivedDataPath "DerivedData" \
          -skipPackagePluginValidation \
          -skipMacroValidation \
          ONLY_ACTIVE_ARCH=NO \
          COMPILATION_CACHE_ENABLE_CACHING=YES \
          OTHER_CODE_SIGN_FLAGS=--timestamp=none \
        | tee xcodebuild.log

    - name: Compute Compilation Cache hash
      if: github.ref == 'refs/heads/main'
      id: compilation-cache-hash
      run: |
        if [ -d "DerivedData/CompilationCache.noindex" ]; then
          hash=$(find DerivedData/CompilationCache.noindex -type f \( -name "*.index" -o -name "*.actions" \) 2>/dev/null | sort | xargs cat | shasum -a 256 | cut -d' ' -f1)
          echo "hash=${hash}" >> $GITHUB_OUTPUT
        else
          echo "No compilation cache directory found (Xcode version may not support compilation caching)"
        fi

    - name: Save Xcode Compilation Cache
      if: github.ref == 'refs/heads/main' && steps.compilation-cache-hash.outputs.hash
      uses: actions/cache/save@v4
      with:
        path: iOS/DerivedData/CompilationCache.noindex
        key: xcode-compilation-cache-ios-e2e-${{ steps.compilation-cache-hash.outputs.hash }}

    - name: Report job duration
      continue-on-error: true
      uses: ./.github/actions/measure-duration
      with:
        mode: stop
        start-timestamp: ${{ steps.start-duration.outputs.start-timestamp }}
        pixel-name: m_ci_apple_duration_ios_e2e_tests_build
        pixel-params: |
          runner: ${{ env.RUNS_ON }}

    - name: Store Binary
      uses: actions/upload-artifact@v4
      with:
        name: duckduckgo-ios-app
        path: iOS/DerivedData/Build/Products/Debug-iphonesimulator/DuckDuckGo.app

    - name: Upload logs when workflow failed
      uses: actions/upload-artifact@v4
      if: failure() || cancelled()
      with:
        name: BuildLogs
        path: |
          iOS/xcodebuild.log
          iOS/DerivedData/Logs/Test/*.xcresult
        retention-days: 7

  setup-matrix:
    name: Resolve test matrix
    needs: build-end-to-end-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    outputs:
      include: ${{ steps.define.outputs.include }}
    steps:
    - name: Define include
      id: define
      run: |
        event="${{ github.event_name }}"
        input_modes="${{ inputs.user_modes }}"
        input_tags="${{ inputs.test_tags }}"
        case "$event" in
          schedule)
            modes='["production", "internal"]'
            ;;
          workflow_dispatch)
            case "$input_modes" in
              internal) modes='["internal"]' ;;
              both)     modes='["production", "internal"]' ;;
              *)        modes='["production"]' ;;
            esac
            ;;
          *)
            modes='["production"]'
            ;;
        esac
        # iPhone tests exclude iPad-tagged tests; iPad tests exclude iPhone-tagged tests.
        base='[
          {"test-tag":"release","exclude-tags":"ipad","device-model":"iPhone-16","device-name":"iPhone","device":"iphone"},
          {"test-tag":"privacy","exclude-tags":"ipad","device-model":"iPhone-16","device-name":"iPhone","device":"iphone"},
          {"test-tag":"securityTest","exclude-tags":"ipad","device-model":"iPhone-16","device-name":"iPhone","device":"iphone"},
          {"test-tag":"adClick","exclude-tags":"ipad","device-model":"iPhone-16","device-name":"iPhone","device":"iphone"},
          {"test-tag":"duckplayer_native","exclude-tags":"ipad","device-model":"iPhone-16","device":"iphone"},
          {"test-tag":"device_info","exclude-tags":"ipad","device-model":"iPhone-16","device":"iphone"},
          {"test-tag":"device_info","exclude-tags":"iphone","device-model":"iPad-10th-generation","device":"ipad"},
          {"test-tag":"duckplayer_classic","exclude-tags":"iphone","device-model":"iPad-10th-generation","device":"ipad"},
          {"test-tag":"duckai_chrome_shortcut","exclude-tags":"iphone","device-model":"iPad-10th-generation","device":"ipad"}
        ]'
        # Comma-separated suite tags from dispatch -> trimmed JSON array; empty = all suites.
        tags=$(jq -nc --arg s "$input_tags" '$s | split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length > 0))')
        # Fail fast on a typo'd tag rather than silently running fewer (or zero) suites.
        if [ "$tags" != "[]" ]; then
          valid=$(echo "$base" | jq -c '[.[]."test-tag"] | unique')
          unknown=$(jq -nc --argjson req "$tags" --argjson ok "$valid" '$req - $ok')
          if [ "$unknown" != "[]" ]; then
            echo "::error::Unknown test_tags $unknown. Valid: $(echo "$valid" | jq -r 'join(", ")')"
            exit 1
          fi
        fi
        include=$(echo "$base" | jq -c \
          --argjson modes "$modes" \
          --argjson tags "$tags" \
          '[ .[]
             | select(($tags | length) == 0 or (.["test-tag"] as $t | $tags | index($t) != null))
             | . as $b
             | $modes[]
             | $b + {"user-mode": .} ]')
        echo "include=$include" >> $GITHUB_OUTPUT
        echo "Requested tags: $tags"
        echo "Resolved include: $include"

  end-to-end-tests:
    name: "E2E: ${{ matrix.test-tag }}${{ matrix.user-mode == 'internal' && ' - internal' || '' }}"
    needs: [build-end-to-end-tests, setup-matrix]
    runs-on: macos-26
    timeout-minutes: 160

    env:
      RUNS_ON: macos-26 # keep this in sync with runs-on above

    strategy:
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.include) }}
      # We have 2 Maestro Cloud runners; legs beyond that just queue cloud-side,
      # so 2 is the effective ceiling until we provision more runners.
      max-parallel: 2
      fail-fast: false

    steps:

    - name: Check out the code
      uses: actions/checkout@v6 # Don't need submodules here as this is only for the tests folder

    - name: Start measuring duration
      id: start-duration
      uses: ./.github/actions/measure-duration
      with:
        mode: start

    - name: Retrieve Binary
      uses: actions/download-artifact@v4
      with:
        name: duckduckgo-ios-app
        path: iOS/DerivedData/Build/Products/Debug-iphonesimulator/DuckDuckGo.app

    - name: Run Maestro tests (${{ matrix.device-name }}${{ matrix.user-mode == 'internal' && ' - internal' || '' }})
      id: upload
      uses: mobile-dev-inc/action-maestro-cloud@v1.9.8
      with:
        api-key: ${{ secrets.ROBIN_API_KEY }}
        project-id: ${{ vars.ROBIN_PROJECT_KEY }}
        name: ${{ matrix.test-tag }}${{ matrix.user-mode == 'internal' && '_internal' || '' }}_${{ matrix.device-name }}_${{ github.sha }}
        timeout: 150
        app-file: iOS/DerivedData/Build/Products/Debug-iphonesimulator/DuckDuckGo.app
        workspace: .maestro
        include-tags: ${{ matrix.test-tag }}
        exclude-tags: ${{ matrix.exclude-tags }}
        env: |
          ONBOARDING_COMPLETED=true
          INTERNAL_USER_MODE=${{ matrix.user-mode == 'internal' && 'true' || '' }}
        device-os: iOS-18-2
        device-model: ${{ matrix.device-model }}
        device-name: ${{ matrix.device-name }}

    - name: Report job duration
      continue-on-error: true
      uses: ./.github/actions/measure-duration
      with:
        mode: stop
        start-timestamp: ${{ steps.start-duration.outputs.start-timestamp }}
        pixel-name: m_ci_apple_duration_ios_e2e_tests_${{ matrix.test-tag }}${{ matrix.user-mode == 'internal' && '_internal' || '' }}
        pixel-params: |
          runner: ${{ env.RUNS_ON }}

    - name: Send Status Pixel
      if: always() && github.ref_name == 'main'
      uses: ./.github/actions/send-pixel
      with:
        pixel-name: m_ci_apple_status_ios_e2e_${{ matrix.test-tag }}${{ matrix.user-mode == 'internal' && '_internal' || '' }}_${{ matrix.device }}_${{ steps.upload.outcome }}

    - name: Mark user-mode failure (e2e)
      if: (failure() || cancelled()) && github.ref_name == 'main'
      working-directory: ${{ github.workspace }}
      run: |
        mkdir -p failure-marker
        echo "e2e:${{ matrix.user-mode }}:${{ matrix.test-tag }}:${{ matrix.device }}" > failure-marker/marker.txt
    - name: Upload failure marker (e2e)
      if: (failure() || cancelled()) && github.ref_name == 'main'
      uses: actions/upload-artifact@v4
      with:
        name: failure-marker-e2e-${{ matrix.user-mode }}-${{ matrix.test-tag }}-${{ matrix.device }}
        path: failure-marker/
        retention-days: 1

  notify-failure:
    name: Notify on failure
    if: ${{ always() && contains(join(needs.*.result, ','), 'failure') && github.ref_name == 'main' }}
    needs: [build-end-to-end-tests, setup-matrix, end-to-end-tests]
    runs-on: ubuntu-latest

    steps:
    - name: Check out the code
      uses: actions/checkout@v6

    - name: Detect failure user-modes
      id: detect
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        artifacts=$(gh api --paginate "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --jq '.artifacts[].name' || true)
        has_production=false
        has_internal=false
        if [ "${{ needs.build-end-to-end-tests.result }}" = "failure" ]; then
          has_production=true
        fi
        # Treat setup-matrix failure as a production failure: e2e jobs got skipped,
        # so no markers exist, but the workflow is broken and someone needs to know.
        if [ "${{ needs.setup-matrix.result }}" = "failure" ]; then
          has_production=true
        fi
        if echo "$artifacts" | grep -E '^failure-marker-e2e-production' >/dev/null; then
          has_production=true
        fi
        if echo "$artifacts" | grep -E '^failure-marker-e2e-internal' >/dev/null; then
          has_internal=true
        fi
        echo "has_production=$has_production" >> "$GITHUB_OUTPUT"
        echo "has_internal=$has_internal" >> "$GITHUB_OUTPUT"
        echo "Detected production failures: $has_production"
        echo "Detected internal failures: $has_internal"

    - name: Create Asana task for production-mode failures
      if: steps.detect.outputs.has_production == 'true'
      run: |
        curl -s "https://app.asana.com/api/1.0/tasks" \
          --header "Accept: application/json" \
          --header "Authorization: Bearer ${{ secrets.ASANA_ACCESS_TOKEN }}" \
          --header "Content-Type: application/json" \
          --data ' { "data": { "name": "GH Workflow Failure - End to end tests", "workspace": "${{ vars.ASANA_WORKSPACE_ID }}", "projects": [ "${{ vars.GH_ASANA_IOS_APP_PROJECT_ID }}" ], "notes" : "The end to end workflow has failed in production user mode. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}. For instructions on how to handle the failure(s), check https://app.asana.com/0/0/1206423571874502/f" } }'

    - name: Create Asana task for internal-mode failures
      if: steps.detect.outputs.has_internal == 'true'
      run: |
        curl -s "https://app.asana.com/api/1.0/tasks" \
          --header "Accept: application/json" \
          --header "Authorization: Bearer ${{ secrets.ASANA_ACCESS_TOKEN }}" \
          --header "Content-Type: application/json" \
          --data ' { "data": { "name": "GH Workflow Failure - End to end tests (internal mode, advance warning)", "workspace": "${{ vars.ASANA_WORKSPACE_ID }}", "projects": [ "${{ vars.GH_ASANA_IOS_APP_PROJECT_ID }}" ], "notes" : "The internal-mode end to end nightly leg has failed. This is an advance warning for a feature still gated to internal users; surface to the feature owner before the production flag flip. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}." } }'
