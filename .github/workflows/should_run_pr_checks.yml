name: Should Run PR Checks

# Reusable workflow that determines whether CI checks should run based on PR draft status and labels
# This workflow can be called by other workflows using workflow_call trigger
#
# Logic:
# - Always runs for non-PR events (push, schedule, workflow_call)
# - Always runs when a PR is unmarked as draft (ready_for_review action)
# - Always runs for PRs that are not in draft state
# - Runs for draft PRs only if they have the specified "run checks" label
#
# Usage:
#   jobs:
#     should-run-checks:
#       uses: ./.github/workflows/should_run_pr_checks.yml
#     other-job:
#       needs: [should-run-checks]
#       if: needs.should-run-checks.outputs.should_run == 'true'

on:
  workflow_call:
    inputs:
      run_checks_label:
        description: 'Label name that allows running checks on draft PRs'
        required: false
        type: string
        default: 'Run PR Checks'
      strict_checks_label:
        description: 'Label name that enables strict test mode (surfaces flaky test iterations in the test report)'
        required: false
        type: string
        default: 'strict pr checks'
    outputs:
      should_run:
        description: 'Whether CI checks should run (true/false)'
        value: ${{ jobs.check.outputs.should_run }}
      strict_mode:
        description: 'Whether strict test mode is enabled (true/false)'
        value: ${{ jobs.check.outputs.strict_mode }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # `gh pr diff` reads the changed-file list via the API
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      strict_mode: ${{ steps.check.outputs.strict_mode }}
    steps:
      - name: Evaluate run conditions
        id: check
        run: |
          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Non-PR event, running checks"
          elif [[ "${{ github.event.action }}" == "edited" && "${{ github.event.sender.type }}" == "Bot" ]]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "PR edited by a bot (${{ github.event.sender.login }}), skipping checks"
          elif [[ "${{ github.event.action }}" == "ready_for_review" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "PR was unmarked as draft, running checks"
          elif [[ "${{ github.event.pull_request.draft }}" != "true" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "PR is ready for review, running checks"
          else
            # Check for run checks label
            labels='${{ toJson(github.event.pull_request.labels) }}'
            if echo "$labels" | jq -e --arg label "${{ inputs.run_checks_label }}" '.[] | select(.name == $label)' > /dev/null 2>&1; then
              echo "should_run=true" >> $GITHUB_OUTPUT
              echo "Draft PR has '${{ inputs.run_checks_label }}' label, running checks"
            else
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "Draft PR without '${{ inputs.run_checks_label }}' label, skipping checks"
            fi
          fi

          # Check for strict mode label
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            labels='${{ toJson(github.event.pull_request.labels) }}'
            if echo "$labels" | jq -e --arg label "${{ inputs.strict_checks_label }}" '.[] | select(.name == $label)' > /dev/null 2>&1; then
              echo "strict_mode=true" >> $GITHUB_OUTPUT
              echo "PR has '${{ inputs.strict_checks_label }}' label, enabling strict mode"
            else
              echo "strict_mode=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "strict_mode=false" >> $GITHUB_OUTPUT
          fi

      # PHASE 1 (shadow): compute per-area change flags for logging only.
      # Nothing gates on them — they are not exposed as outputs. The steps are
      # deliberately fail-open: any error (or a non-PR event) yields all-true,
      # i.e. exactly today's "run everything" behaviour, so they can never make
      # the check job fail and skip downstream checks.
      #
      # The group definitions and matcher live in a shared script so that the
      # replay/validation workflow (replay_change_detection.yml) can never
      # drift from what this gate computes.
      - name: Check out the change-detection script
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          sparse-checkout: .github/scripts/detect-changed-areas.sh
          sparse-checkout-cone-mode: false

      - name: Detect changed paths (shadow)
        id: paths
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          fail_open() {
            for area in ios macos shared; do echo "${area}=true" >> "$GITHUB_OUTPUT"; done
            echo "$1"
            exit 0
          }

          if [[ "${{ github.event_name }}" != "pull_request" ]]; then
            fail_open "Non-PR event (${{ github.event_name }}): all areas = true (unchanged from today)"
          fi

          files=$(gh pr diff "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --name-only) \
            || fail_open "Could not read changed files: failing open to all areas = true"

          flags=$(echo "$files" | .github/scripts/detect-changed-areas.sh) \
            || fail_open "detect-changed-areas.sh failed: failing open to all areas = true"

          echo "$flags" >> "$GITHUB_OUTPUT"
          echo "$flags"

      # PHASE 1 (shadow): log what a future gating phase WOULD skip. Purely
      # informational — lets us eyeball the flags against real PRs before any
      # job is gated on them.
      - name: Shadow report
        if: always()
        run: |
          echo "::group::Change-detection shadow report"
          echo "event=${{ github.event_name }} should_run=${{ steps.check.outputs.should_run }}"
          echo "flags: ios=${{ steps.paths.outputs.ios }} macos=${{ steps.paths.outputs.macos }} shared=${{ steps.paths.outputs.shared }}"
          [ "${{ steps.paths.outputs.ios }}" = "false" ]    && echo "WOULD-SKIP: iOS Unit Tests / Make Release Build"
          [ "${{ steps.paths.outputs.macos }}" = "false" ]  && echo "WOULD-SKIP: macOS Test / Release Build / Notarized / PIR / performance"
          [ "${{ steps.paths.outputs.shared }}" = "false" ] && echo "WOULD-SKIP: BSK + DBP unit tests / DBP Test Report"
          echo "::endgroup::"
          exit 0