name: iOS - Shared Web Tests

on:
  workflow_dispatch:
    inputs:
      all_os_versions:
        description: "Test all supported macOS versions (not just the latest)"
        type: boolean
        default: true
  schedule:
    - cron: '0 2 * * *' # Run at 2 AM UTC
  workflow_call:
    inputs:
      all_os_versions:
        description: "Test all supported macOS versions (not just the latest)"
        type: boolean
        default: true
    secrets:
      APPLE_API_KEY_BASE64:
        required: true
      APPLE_API_KEY_ID:
        required: true
      APPLE_API_KEY_ISSUER:
        required: true
      ASANA_ACCESS_TOKEN:
        required: true
      MATCH_PASSWORD:
        required: true
      SSH_PRIVATE_KEY_FASTLANE_MATCH:
        required: true

jobs:
  setup-matrix:
    name: Set up test matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.define-matrix.outputs.matrix }}
    steps:
      - name: Define matrix
        id: define-matrix
        run: |
          all_os_versions="${{ inputs.all_os_versions || 'true' }}"
          if [[ "$all_os_versions" == "false" ]]; then
            matrix=$(jq -c <<< '[
              {"runner": "macos-15", "xcode-version": "16.2", "ios-sdk": "18.2", "target-device": "iPhone-16", "target-os": "iOS-18-2", "os-version": "15"}
            ]')
          else
            matrix=$(jq -c <<< '[
              {"runner": "macos-14", "xcode-version": "15.4", "ios-sdk": "17.5", "target-device": "iPhone-15", "target-os": "iOS-17-5", "os-version": "14"},
              {"runner": "macos-15", "xcode-version": "16.2", "ios-sdk": "18.2", "target-device": "iPhone-16", "target-os": "iOS-18-2", "os-version": "15"}
            ]')
          fi
          echo "matrix=${matrix}" >> $GITHUB_OUTPUT

  shared-web-tests:
    name: Shared web tests (macOS ${{ matrix.os-version }})
    needs: setup-matrix
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    steps:
    - name: Check out the code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Select Xcode
      uses: ./.github/actions/select-xcode-version
      with:
        xcode-version: ${{ matrix.xcode-version }}

    - name: Checkout shared web tests
      uses: actions/checkout@v4
      with:
        submodules: recursive
        repository: duckduckgo/shared-web-tests
        path: tmp/shared-web-tests
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and run tests
      env:
        TARGET_DEVICE: ${{ matrix.target-device }}
        TARGET_OS: ${{ matrix.target-os }}
        IOS_SDK_VERSION: ${{ matrix.ios-sdk }}
      run: |
        PROJECT_ROOT="$(pwd)"
        export TARGET_DEVICE TARGET_OS IOS_SDK_VERSION
        . iOS/scripts/shared_web_tests.sh

    - name: Upload logs when workflow failed
      uses: actions/upload-artifact@v4
      if: failure() || cancelled()
      with:
        name: "BuildLogs-macOS-${{ matrix.os-version }}"
        path: |
            tmp/test_out_*.log
        retention-days: 7

  create-asana-task:
    name: Create Asana Task
    needs: [shared-web-tests]

    if: failure()

    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4
      - name: Create Asana task when workflow failed
        uses: duckduckgo/native-github-asana-sync@v1.1
        with:
          action: create-asana-task
          asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
          asana-project: ${{ vars.APPLE_CI_FAILING_TESTS_PROJECT_ID }}
          asana-section: ${{ vars.APPLE_CI_FAILING_TESTS_IOS_SHARED_WEB_TESTS_SECTION_ID }}
          asana-task-name: GH Workflow Failure - iOS Shared Web Tests
          asana-task-description: The iOS Shared Web Tests workflow has failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
