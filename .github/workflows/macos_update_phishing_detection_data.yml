name: macOS - Update Phishing Detection Datasets

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Midnight UTC every Sunday

jobs:
  update_data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          repository: duckduckgo/apple-browsers
          path: apple-monorepo/
          persist-credentials: false
      - name: Execute Update Script
        run: |
          cd ./apple-monorepo/macOS
          REVISION="$(bash ./scripts/update_phishing_detection_data.sh | grep -oP 'Updated revision from \K\d+')"
          echo "REVISION=$REVISION" >> $GITHUB_ENV
          TEMPLATE="$(bash ./scripts/update_phishing_detection_data.sh pr-body)"
          PR_BODY_MACOS="${TEMPLATE//\{\{revision\}\}/$REVISION}"
          echo "PR_BODY_MACOS<<EOF" >> $GITHUB_ENV
          echo "$PR_BODY_MACOS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Create PR for macOS
        uses: peter-evans/create-pull-request@v7
        id: create-pr
        with:
          path: apple-monorepo/
          add-paths: |
            ./macOS/DuckDuckGo/MaliciousSiteProtection/
          commit-message: Update phishing detection data to revision ${{ env.REVISION }}
          branch: update-phishing-protection-${{ env.REVISION }}
          title: Update phishing protection datasets to ${{ env.REVISION }}
          body: "${{ env.PR_BODY_MACOS }}"
          reviewers: alessandroboron,mallexxx,sabrinatardio
      # Only notify for scheduled (cron) runs; manual dispatches are ignored.
      - name: Resolve Asana assignee
        id: asana-assignee
        if: failure() && github.event_name == 'schedule'
        continue-on-error: true  # Fall back to an unassigned task if the lookup fails.
        uses: duckduckgo/native-github-asana-sync@v1.9
        with:
          action: get-asana-user-id
          github-username: alessandroboron
          github-pat: ${{ secrets.APPLE_GH_RO_PAT }}
      - name: Create Asana task on failure
        if: failure() && github.event_name == 'schedule'
        uses: duckduckgo/native-github-asana-sync@v1.9
        with:
          action: create-asana-task
          asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
          asana-project: "1203301625297703"
          asana-task-name: Malicious Sites Protection update failed
          asana-task-description: The macOS - Update Phishing Detection Datasets workflow has failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          asana-task-assignee: ${{ steps.asana-assignee.outputs.asanaUserId }}
