name: Apple - Shared Web Tests

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform(s) to run"
        default: both
        type: choice
        options:
          - both
          - ios
          - macos
  schedule:
    - cron: '0 2 * * *' # Run at 2 AM UTC
  workflow_call:
    inputs:
      platform:
        description: "Platform(s) to run"
        required: false
        type: string
        default: both
    secrets:
      APPLE_API_KEY_BASE64:
        required: true
      APPLE_API_KEY_ID:
        required: true
      APPLE_API_KEY_ISSUER:
        required: true
      ASANA_ACCESS_TOKEN:
        required: true
      MATCH_PASSWORD:
        required: true
      SSH_PRIVATE_KEY_DUCKSANS_FONT:
        required: true
      SSH_PRIVATE_KEY_FASTLANE_MATCH:
        required: true

jobs:
  ios-shared-web-tests:
    name: iOS shared web tests
    if: ${{ github.event_name == 'schedule' || inputs.platform != 'macos' }}

    runs-on: macos-26
    timeout-minutes: 30
    steps:

    - name: Register SSH keys for private repos
      uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_DUCKSANS_FONT }}

    - name: Check out the code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Select Xcode
      uses: ./.github/actions/select-xcode-version

    - name: Checkout shared web tests
      uses: actions/checkout@v6
      with:
        submodules: recursive
        repository: duckduckgo/shared-web-tests
        path: tmp/shared-web-tests
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and run tests
      run: |
        PROJECT_ROOT="$(pwd)"
        . iOS/scripts/shared_web_tests.sh

    - name: Collect diagnostic logs on failure
      if: failure() || cancelled()
      run: |
        set +e
        mkdir -p tmp/diagnostics

        echo "=== Searching for ddgdriver output.log files ==="
        find . -name "output.log" -not -path "*/node_modules/*" 2>/dev/null | while read f; do
          echo "Found: $f ($(wc -c < "$f") bytes)"
          cp "$f" "tmp/diagnostics/ddgdriver_output_$(echo "$f" | tr '/' '_').log" 2>/dev/null || true
        done

        echo "=== Process snapshot ==="
        ps -axo pid,ppid,command | grep -iE "duckduckgo|ddgdriver|wpt|simctl" > tmp/diagnostics/ios_processes.log 2>&1 || true

        echo "=== Booted simulators ==="
        xcrun simctl list devices booted -j 2>/dev/null > tmp/diagnostics/ios_booted_sims.json || true

        UDID=$(xcrun simctl list devices booted -j 2>/dev/null \
          | python3 -c "import sys,json; devs=[d for dl in json.load(sys.stdin).get('devices',{}).values() for d in dl if d.get('state')=='Booted']; print(devs[0]['udid'] if devs else '')" 2>/dev/null)
        if [ -n "$UDID" ]; then
          echo "Collecting app logs from simulator $UDID"
          xcrun simctl spawn "$UDID" log show --last 15m --info --debug \
            --predicate 'subsystem == "com.duckduckgo.mobile.ios"' \
            --style compact > tmp/diagnostics/ios_simulator_app.log 2>&1 || true
        fi

    - name: Upload logs when workflow failed
      uses: actions/upload-artifact@v4
      if: failure() || cancelled()
      with:
        name: iOS-BuildLogs
        if-no-files-found: warn
        path: |
            tmp/test_out_*.log
            tmp/shared-web-tests/**/output.log
            tmp/diagnostics/
        retention-days: 7

  macos-shared-web-tests:
    name: macOS shared web tests
    if: ${{ github.event_name == 'schedule' || inputs.platform != 'ios' }}

    runs-on: macos-26
    timeout-minutes: 30
    steps:

    - name: Register SSH keys for private repos
      uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_DUCKSANS_FONT }}

    - name: Check out the code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Select Xcode
      uses: ./.github/actions/select-xcode-version

    - name: Checkout shared web tests
      uses: actions/checkout@v6
      with:
        submodules: recursive
        repository: duckduckgo/shared-web-tests
        path: tmp/shared-web-tests
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install prerequisites
      run: |
        if ! command -v cargo > /dev/null 2>&1; then
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        fi

    - name: Build macOS app
      # Debug configuration required: the automation server only starts when
      # LaunchOptionsHandler.isWebDriverAutomationSession detects isDebugBuild.
      run: |
        xcodebuild build \
          -workspace DuckDuckGo.xcworkspace \
          -scheme "macOS Browser" \
          -configuration Debug \
          -destination "platform=macOS" \
          -derivedDataPath DerivedData \
          -skipPackagePluginValidation \
          -skipMacroValidation \
          ONLY_ACTIVE_ARCH=YES \
          DEBUG_INFORMATION_FORMAT=dwarf \
          COMPILER_INDEX_STORE_ENABLE=NO \
          DEPLOYMENT_LOCATION=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Build and run tests
      shell: bash
      run: |
        cd tmp/shared-web-tests
        log_path="../../tmp/test_out_macos_$(date +"%Y%m%d_%H%M%S").log"
        mkdir -p "$(dirname "$log_path")"
        touch "$log_path"

        if ! npm run build; then
          echo "npm build failed."
          exit 1
        fi

        if ! grep -q "Start web-platform-tests hosts" /etc/hosts; then
          sudo -- sh -c 'npm run install-hosts' || true
        fi

        MACOS_APP_PATH="$(pwd)/../../DerivedData/Build/Products/Debug/DuckDuckGo.app"
        export MACOS_APP_PATH
        export TARGET_PLATFORM=macos

        set +e
        source build/_venv3/bin/activate 2>/dev/null
        set -e
        TARGET_PLATFORM=macos ./build/wpt run \
          --product duckduckgo \
          --binary webdriver/target/debug/ddgdriver \
          --log-mach - --log-mach-level info \
          duckduckgo \
          2>&1 | tee -a "$log_path"

    - name: Collect diagnostic logs on failure
      if: failure() || cancelled()
      run: |
        set +e
        mkdir -p tmp/diagnostics

        echo "=== Searching for ddgdriver output.log files ==="
        find . -name "output.log" -not -path "*/node_modules/*" 2>/dev/null | while read f; do
          echo "Found: $f ($(wc -c < "$f") bytes)"
          cp "$f" "tmp/diagnostics/ddgdriver_output_$(echo "$f" | tr '/' '_').log" 2>/dev/null || true
        done

        echo "=== Process snapshot ==="
        ps -axo pid,ppid,command | grep -iE "duckduckgo|ddgdriver|wpt" > tmp/diagnostics/macos_processes.log 2>&1 || true

        echo "=== macOS app system logs ==="
        log show --last 15m --info --debug \
          --predicate 'subsystem == "com.duckduckgo.macos.browser" OR subsystem == "com.duckduckgo.macos.browser.debug"' \
          --style compact > tmp/diagnostics/macos_app_system.log 2>&1 || true

        echo "=== DerivedData build products ==="
        ls -la DerivedData/Build/Products/Debug/ > tmp/diagnostics/macos_build_products.log 2>&1 || true

    - name: Upload logs when workflow failed
      uses: actions/upload-artifact@v4
      if: failure() || cancelled()
      with:
        name: macOS-BuildLogs
        if-no-files-found: warn
        path: |
            tmp/test_out_*.log
            tmp/shared-web-tests/**/output.log
            tmp/diagnostics/
        retention-days: 7

  create-asana-task:
    name: Create Asana Task
    needs: [ios-shared-web-tests, macos-shared-web-tests]

    if: ${{ always() && github.event_name == 'schedule' && (needs.ios-shared-web-tests.result == 'failure' || needs.ios-shared-web-tests.result == 'cancelled' || needs.macos-shared-web-tests.result == 'failure' || needs.macos-shared-web-tests.result == 'cancelled') }}

    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v6
      - name: Create Asana task when workflow failed
        uses: duckduckgo/native-github-asana-sync@v1.1
        with:
          action: create-asana-task
          asana-pat: ${{ secrets.ASANA_ACCESS_TOKEN }}
          asana-project: ${{ vars.APPLE_CI_FAILING_TESTS_PROJECT_ID }}
          asana-section: ${{ vars.APPLE_CI_FAILING_TESTS_IOS_SHARED_WEB_TESTS_SECTION_ID }}
          asana-task-name: GH Workflow Failure - Apple Shared Web Tests (iOS or macOS)
          asana-task-description: The Apple Shared Web Tests workflow has failed (iOS and/or macOS). See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
